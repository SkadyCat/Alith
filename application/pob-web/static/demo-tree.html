<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>伤害流程图</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#080604; color:#c8c0b0; font-family:'Segoe UI',sans-serif; overflow:hidden; width:100vw; height:100vh; }
#loading { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; font-size:14px; color:#806050; background:#080604; z-index:99; }
canvas { display:block; }
#hcard {
  position:fixed; pointer-events:none; display:none;
  background:#1a1510ee; border:1px solid #c8a24b88; border-radius:8px;
  padding:10px 14px; font-size:12px; color:#c8c0b0;
  box-shadow:0 6px 24px #00000099; max-width:280px; z-index:50; line-height:1.6;
}
</style>
</head>
<body>
<div id="loading">⏳ 加载构筑数据中…</div>
<canvas id="cv"></canvas>
<div id="hcard"></div>
<script>
// ─── Color palette ─────────────────────────────────────────────
const C = {
  bg:'#080604', wire:'#3a3020',
  root: { fill:'#1e1600', stroke:'#f0d078', text:'#f0d078', glow:'#c8a24b' },
  dps:  { fill:'#1a1500', stroke:'#c8a24b', text:'#c8a24b', glow:'#c8a24b88' },
  base: { fill:'#0a1220', stroke:'#5588ee', text:'#88aaff', glow:'#3366cc44' },
  inc:  { fill:'#0a1a0a', stroke:'#50c878', text:'#78e878', glow:'#30a05044' },
  more: { fill:'#1a0e04', stroke:'#cc8844', text:'#ddaa66', glow:'#aa663344' },
  crit: { fill:'#120a1e', stroke:'#aa66cc', text:'#cc88ff', glow:'#883399' },
  leaf_node: { fill:'#0e160e', stroke:'#30783050', text:'#c8c0b0', hl:'#50c878' },
  leaf_item: { fill:'#180e06', stroke:'#6640205a', text:'#c8c0b0', hl:'#cc8844' },
  leaf_more: { fill:'#150c1e', stroke:'#6633885a', text:'#c8c0b0', hl:'#aa66cc' },
  text2:'#806050', conn:'#5a4828',
};

// ─── Format helpers ────────────────────────────────────────────
const fmt  = n => { n=Number(n||0); return n>=1e6?(n/1e6).toFixed(2)+'M':n>=10000?(n/1000).toFixed(1)+'K':n>=1000?n.toLocaleString():n.toFixed(1); };
const fmtP = p => (p>0?'+':'')+Number(p).toFixed(1)+'%';

// ─── State ─────────────────────────────────────────────────────
let nodes = [], edges = [], hitAreas = [];
let panX=0, panY=0, scale=1;
let dragging=false, lastMX=0, lastMY=0;
let canvas, ctx;

// ─── Node builder helpers ──────────────────────────────────────
function makeNode(id, opts) {
  return { id, x:0, y:0, w:opts.w||180, h:opts.h||56,
    title:opts.title||'', sub:opts.sub||'', val:opts.val||'',
    style:opts.style||C.base, shape:opts.shape||'rect',
    tooltip:opts.tooltip||null, clickFn:opts.clickFn||null,
    ...opts };
}
function edge(from, to, label) { edges.push({from,to,label}); }

// ─── Load & build graph ────────────────────────────────────────
async function load() {
  let resp;
  try {
    resp = await fetch('/api/analyze/doc',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({doc_path:'poe/pob_list/冬潮烙印.md'})});
    resp = await resp.json();
  } catch(e) { document.getElementById('loading').textContent='加载失败: '+e.message; return; }

  document.getElementById('loading').style.display='none';
  buildGraph(resp.build);
}

function buildGraph(build) {
  const db = build.damage_breakdown;
  const stats = build.stats || [];
  const sm = {};
  for (const s of stats) if (s&&s.id) sm[s.id] = s.raw||0;

  const finalHit   = db.pob_avg_hit || db.computed_avg_hit || 0;
  const speed      = sm['Speed'] || 0;
  const totalDPS   = sm['TotalDPS'] || 0;
  const combined   = sm['CombinedDPS'] || totalDPS;
  const incFactor  = db.inc_factor || 1;
  const incTotal   = db.inc_total || 0;
  const critScale  = db.crit_scale || 1;
  const hasCrit    = critScale > 1.001;
  const moreChain  = db.more_chain || [];
  const moreProd   = moreChain.reduce((p,m)=>p*Number(m.mult||1),1);
  const denom      = incFactor * moreProd * (hasCrit ? critScale : 1);
  const implied    = (finalHit>0&&denom>0) ? finalHit/denom : (db.base_avg||0);
  const nodeDetails = (db.inc_nodes_detail||[]).slice().sort((a,b)=>b.pct-a.pct);
  const itemDetails = (db.inc_items_detail||[]).slice().sort((a,b)=>b.pct-a.pct);

  nodes = []; edges = [];

  // ── Root: TotalDPS ─────────────────────────────────────────
  const hasDPS = speed>0 && totalDPS>0;
  let rootId;
  if (hasDPS) {
    rootId = 'root_dps';
    nodes.push(makeNode('root_dps', {
      w:240, h:70, shape:'diamond',
      title:`⚔  总 DPS`,
      sub:`${fmt(totalDPS)}${combined>totalDPS*1.05?'  (综合'+fmt(combined)+')':''}`,
      val: fmt(totalDPS),
      style: C.root,
    }));
    nodes.push(makeNode('avg_hit', {
      w:220, h:60,
      title:`🎯  平均单次命中`,
      sub:`PoB AverageHit`,
      val: fmt(finalHit),
      style: C.dps,
    }));
    edge('root_dps','avg_hit', `÷ ${speed.toFixed(2)}/秒`);
    rootId = 'avg_hit';
  } else {
    rootId = 'avg_hit';
    nodes.push(makeNode('avg_hit', {
      w:220, h:70, shape:'diamond',
      title:`🎯  平均命中`,
      sub:`PoB AverageHit`,
      val: fmt(finalHit),
      style: C.root,
    }));
  }

  // Middle factor nodes
  const midNodes = [];

  // Base node
  nodes.push(makeNode('base', {
    w:200, h:56,
    title:`💎  基础伤害`,
    sub:`${db.skill_cn||db.skill_name} L${db.gem_level||'?'}`,
    val: fmt(implied),
    style: C.base,
  }));
  midNodes.push('base');

  // Inc node + children
  nodes.push(makeNode('inc', {
    w:200, h:56,
    title:`⊕  增伤乘区`,
    sub:`共 ${incTotal.toFixed(0)}%`,
    val: `×${incFactor.toFixed(2)}`,
    style: C.inc,
  }));
  midNodes.push('inc');

  // Inc leaf children (up to 12 visible, rest collapsed)
  const MAX_LEAF = 12;
  const allLeaves = [
    ...nodeDetails.map(nd => ({id:'nd_'+nd.node_id, label:nd.source||'天赋', val:fmtP(nd.pct), kind:'node', data:nd})),
    ...itemDetails.map(it => ({id:'it_'+it.slot_en, label:it.item_name||it.source||'装备', val:fmtP(it.pct), kind:'item', data:it})),
  ];
  const shown = allLeaves.slice(0, MAX_LEAF);
  const rest  = allLeaves.length - MAX_LEAF;

  for (const leaf of shown) {
    const sty = leaf.kind==='item' ? C.leaf_item : C.leaf_node;
    nodes.push(makeNode(leaf.id, {
      w:150, h:44,
      title: leaf.label,
      val: leaf.val,
      style: sty,
      tooltip: leaf.kind==='node'
        ? `节点: ${leaf.label}\n增伤: ${leaf.val}\nID: ${leaf.data.node_id||'-'}`
        : `装备: ${leaf.label}\n增伤: ${leaf.val}\n槽位: ${leaf.data.slot_en||'-'}`,
    }));
    edge('inc', leaf.id, null);
  }
  if (rest > 0) {
    nodes.push(makeNode('inc_more', { w:150, h:44, title:`+${rest} 个天赋…`, val:'', style:C.leaf_node }));
    edge('inc', 'inc_more', null);
  }

  // More gem nodes
  for (let i=0; i<moreChain.length; i++) {
    const m = moreChain[i];
    const mid2 = `more_${i}`;
    nodes.push(makeNode(mid2, {
      w:200, h:56,
      title:`✕  More 乘区`,
      sub:`${m.name_cn||m.name_en||'辅助'}${m.level?' L'+m.level:''}`,
      val:`×${Number(m.mult||1).toFixed(2)}`,
      style: C.more,
    }));
    midNodes.push(mid2);
  }

  // Crit node
  if (hasCrit) {
    nodes.push(makeNode('crit', {
      w:200, h:56,
      title:`⚡  暴击均摊`,
      sub:`${db.crit_chance}% · ×${Number(db.crit_multi||1).toFixed(2)}倍率`,
      val:`×${critScale.toFixed(3)}`,
      style: C.crit,
    }));
    midNodes.push('crit');
  }

  // Edges: rootId → each midNode, with ×multiplier label
  for (const mid of midNodes) {
    const nd = nodes.find(n=>n.id===mid);
    edge(rootId, mid, nd ? nd.val : null);
  }

  // ── Auto-layout ────────────────────────────────────────────
  layoutGraph();
  initCanvas();
}

// ─── Hierarchical layout ───────────────────────────────────────
function layoutGraph() {
  // Build adjacency
  const children = {}, parents = {};
  const nodeMap  = {};
  for (const n of nodes) { nodeMap[n.id]=n; children[n.id]=[]; parents[n.id]=[]; }
  for (const e of edges) {
    children[e.from].push(e.to);
    parents[e.to].push(e.from);
  }

  // BFS level assignment
  const level = {};
  const roots = nodes.filter(n=>parents[n.id].length===0).map(n=>n.id);
  const queue = [...roots];
  for (const r of roots) level[r]=0;
  while (queue.length) {
    const cur = queue.shift();
    for (const ch of children[cur]) {
      if (level[ch]===undefined) { level[ch]=(level[cur]||0)+1; queue.push(ch); }
    }
  }

  // Group by level
  const byLevel = {};
  for (const n of nodes) {
    const lv = level[n.id]||0;
    if (!byLevel[lv]) byLevel[lv]=[];
    byLevel[lv].push(n.id);
  }

  const GAP_X = 30, GAP_Y = 100;

  for (const lv of Object.keys(byLevel).sort((a,b)=>a-b)) {
    const ids = byLevel[lv];
    const totalW = ids.reduce((s,id)=>s+nodeMap[id].w+GAP_X, -GAP_X);
    let cx = -totalW/2;
    for (const id of ids) {
      const n = nodeMap[id];
      n.y = lv * (100 + GAP_Y);
      n.x = cx + n.w/2;
      cx += n.w + GAP_X;
    }
  }

  // Center x around 0 — already done above
}

// ─── Canvas init ───────────────────────────────────────────────
function initCanvas() {
  canvas = document.getElementById('cv');
  ctx    = canvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);

  canvas.addEventListener('wheel', onWheel, {passive:false});
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  canvas.addEventListener('mouseup', ()=>dragging=false);
  canvas.addEventListener('mouseleave', ()=>{ dragging=false; document.getElementById('hcard').style.display='none'; });

  // initial center on root
  const root = nodes.find(n=>n.id==='root_dps'||n.id==='avg_hit');
  if (root) { panX = -root.x * scale; panY = 60; }

  draw();
}

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
}

// ─── Draw ──────────────────────────────────────────────────────
function draw() {
  if (!ctx) return;
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle = C.bg; ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(W/2 + panX, 80 + panY);
  ctx.scale(scale, scale);

  // Grid dots
  const gs = 60 * scale;
  ctx.fillStyle = '#ffffff08';
  for (let gx=-W; gx<W; gx+=gs) for (let gy=-200; gy<H*2; gy+=gs) {
    const wx = (gx - panX - W/2)/scale, wy = (gy - panY - 80)/scale;
    ctx.beginPath(); ctx.arc(wx, wy, 1, 0, Math.PI*2); ctx.fill();
  }

  drawEdges();
  drawNodes();
  ctx.restore();
}

function wx(n) { return n.x; }
function wy(n) { return n.y + n.h/2; }
function nodeMap() { const m={}; for(const n of nodes)m[n.id]=n; return m; }

function drawEdges() {
  const nm = nodeMap();
  for (const e of edges) {
    const A = nm[e.from], B = nm[e.to];
    if (!A||!B) continue;
    const ax = A.x, ay = A.y + A.h;
    const bx = B.x, by = B.y;
    const cy1 = ay + (by-ay)*0.5, cy2 = cy1;

    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.bezierCurveTo(ax, cy1, bx, cy2, bx, by);
    ctx.strokeStyle = C.conn;
    ctx.lineWidth = 1.5;
    ctx.setLineDash([5,4]);
    ctx.stroke();
    ctx.setLineDash([]);

    // arrowhead
    const ang = Math.atan2(by - cy2, bx - bx) || -Math.PI/2;
    const aw = 6;
    ctx.beginPath();
    ctx.moveTo(bx - aw*Math.sin(ang-0.4), by - aw*Math.cos(ang-0.4));
    ctx.lineTo(bx, by - 3);
    ctx.lineTo(bx + aw*Math.sin(ang-0.4), by - aw*Math.cos(ang-0.4));
    ctx.strokeStyle = '#8a7040';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // label
    if (e.label) {
      const lx = (ax+bx)/2, ly = (ay+by)/2;
      ctx.font = 'bold 11px Segoe UI';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      const tw = ctx.measureText(e.label).width;
      ctx.fillStyle = '#0e0c0a';
      ctx.fillRect(lx-tw/2-5, ly-9, tw+10, 18);
      ctx.fillStyle = '#a08030';
      ctx.fillText(e.label, lx, ly);
    }
  }
}

function drawNodes() {
  hitAreas = [];
  for (const n of nodes) {
    const { x, y, w, h, style } = n;
    const x0 = x - w/2, y0 = y;
    const r  = n.shape==='diamond' ? 6 : 8;

    // Shadow/glow
    if (style.glow) {
      ctx.shadowColor = style.glow;
      ctx.shadowBlur  = 18;
    }

    // Background
    ctx.beginPath();
    if (n.shape==='diamond') {
      ctx.moveTo(x, y0-4);
      ctx.lineTo(x0+w, y0+h/2);
      ctx.lineTo(x, y0+h+4);
      ctx.lineTo(x0, y0+h/2);
      ctx.closePath();
    } else {
      ctx.roundRect(x0, y0, w, h, r);
    }
    ctx.fillStyle = style.fill;
    ctx.fill();
    ctx.strokeStyle = style.stroke;
    ctx.lineWidth = n.shape==='diamond' ? 2 : 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Content
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    if (n.val) {
      // Title left, value right
      const titleX = x0 + 10, valX = x0 + w - 10;
      ctx.font = 'bold 13px Segoe UI';
      ctx.textAlign = 'left';
      ctx.fillStyle = style.text||'#c8c0b0';
      // truncate title
      let title = n.title;
      const maxW = w - 70;
      if (ctx.measureText(title).width > maxW) {
        while (ctx.measureText(title+'…').width>maxW && title.length>1) title=title.slice(0,-1);
        title+='…';
      }
      ctx.fillText(title, titleX, y0 + h*0.35);
      if (n.sub) {
        ctx.font = '10px Segoe UI';
        ctx.fillStyle = C.text2;
        ctx.fillText(n.sub, titleX, y0 + h*0.68);
      }
      ctx.font = 'bold 13px Segoe UI';
      ctx.textAlign = 'right';
      ctx.fillStyle = style.text||'#f0d078';
      ctx.fillText(n.val, valX, y0 + h/2);
    } else {
      // Centered title only
      ctx.font = '11px Segoe UI';
      ctx.textAlign = 'center';
      ctx.fillStyle = '#806050';
      ctx.fillText(n.title, x, y0 + h/2);
    }

    hitAreas.push({ x:x0, y:y0, w, h, node:n });
  }
}

// ─── Interaction ───────────────────────────────────────────────
function onWheel(ev) {
  ev.preventDefault();
  const factor = ev.deltaY < 0 ? 1.1 : 0.9;
  scale = Math.max(0.2, Math.min(3, scale * factor));
  draw();
}
function onDown(ev) { dragging=true; lastMX=ev.clientX; lastMY=ev.clientY; }
function onMove(ev) {
  if (dragging) {
    panX += ev.clientX - lastMX;
    panY += ev.clientY - lastMY;
    lastMX=ev.clientX; lastMY=ev.clientY;
    draw();
  }
  // Hover detection
  const W=canvas.width, H=canvas.height;
  const mx = (ev.clientX - W/2 - panX) / scale;
  const my = (ev.clientY - 80 - panY) / scale;
  const hcard = document.getElementById('hcard');
  let hit = null;
  for (const ha of hitAreas) {
    if (mx>=ha.x && mx<=ha.x+ha.w && my>=ha.y && my<=ha.y+ha.h) { hit=ha; break; }
  }
  if (hit && hit.node.tooltip) {
    hcard.style.display = 'block';
    hcard.innerHTML = hit.node.tooltip.replace(/\n/g,'<br>');
    hcard.style.left = (ev.clientX+14)+'px';
    hcard.style.top  = (ev.clientY-10)+'px';
    canvas.style.cursor = 'pointer';
  } else {
    hcard.style.display = 'none';
    canvas.style.cursor = dragging ? 'grabbing' : 'grab';
  }
}

// ─── Boot ──────────────────────────────────────────────────────
load();
</script>
</body>
</html>
