<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>技能系统 — Skill Builder</title>
<style>
  :root { --bg:#0e0e14;--panel:#16161e;--panel2:#1e1e2e;--border:#2a2a3a;--accent:#c9a84c;--accent2:#7b68ee;--text:#d4d4d8;--muted:#6b7280;--tag-bg:#1e2030;--tag-border:#374151; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column}
  header{background:var(--panel);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0}
  header h1{font-size:18px;color:var(--accent);font-weight:700;letter-spacing:1px}
  header span{color:var(--muted);font-size:13px}
  .main{display:flex;flex:1;overflow:hidden}
  .sidebar{width:300px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
  .sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
  .tab-btn{flex:1;padding:10px 4px;font-size:13px;background:none;border:none;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
  .search-box{padding:10px 12px;border-bottom:1px solid var(--border)}
  .search-box input{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-size:13px;outline:none}
  .search-box input:focus{border-color:var(--accent)}
  .tag-filter{padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px;border-bottom:1px solid var(--border);max-height:120px;overflow-y:auto}
  .tag-chip{font-size:11px;padding:2px 8px;border-radius:10px;border:1px solid var(--tag-border);background:var(--tag-bg);color:var(--muted);cursor:pointer;transition:all .15s}
  .tag-chip:hover,.tag-chip.active{background:var(--accent);border-color:var(--accent);color:#000}
  .list{flex:1;overflow-y:auto}
  .list-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
  .list-item:hover{background:var(--panel2)}
  .list-item.selected{background:#1e1a0e;border-left:3px solid var(--accent)}
  .item-name{font-size:14px;font-weight:600;color:var(--text)}
  .item-en{font-size:11px;color:var(--muted);margin-top:2px}
  .item-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:5px}
  .tag{font-size:10px;padding:1px 6px;border-radius:8px;border:1px solid var(--tag-border)}
  .detail{flex:1;padding:24px;overflow-y:auto}
  .no-select{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:15px}
  .detail-header{margin-bottom:20px}
  .detail-header h2{font-size:24px;color:var(--accent);font-weight:700}
  .detail-header .en{font-size:14px;color:var(--muted);margin-top:4px}
  .detail-header .desc{margin-top:10px;font-size:14px;line-height:1.6}
  .detail-tags{display:flex;flex-wrap:wrap;gap:6px;margin:14px 0}
  .detail-tag{font-size:12px;padding:3px 10px;border-radius:10px;border:1px solid var(--tag-border);cursor:pointer;transition:opacity .15s}
  .detail-tag:hover{opacity:.7}
  .stat-row{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
  .stat{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px 16px}
  .stat label{font-size:11px;color:var(--muted);display:block;margin-bottom:3px}
  .stat value{font-size:16px;font-weight:600;color:var(--accent)}
  .section-title{font-size:13px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
  .support-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
  .support-card{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .15s}
  .support-card:hover{border-color:var(--accent2)}
  .support-card h4{font-size:14px;color:var(--accent2);margin-bottom:4px}
  .support-card .s-en{font-size:11px;color:var(--muted)}
  .support-card .s-effect{font-size:12px;color:#a3e635;margin-top:6px}
  .support-card .s-desc{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.4}
  .req-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
  .req-tag{font-size:10px;padding:1px 6px;border-radius:8px}
  .req-any{background:#1e3a1e;border:1px solid #4ade80;color:#4ade80}
  .req-all{background:#1e1e3a;border:1px solid #60a5fa;color:#60a5fa}
  .req-exc{background:#3a1e1e;border:1px solid #f87171;color:#f87171}
  .skill-mini{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;transition:background .15s}
  .skill-mini:hover{background:var(--panel2)}
  .skill-mini .sn{font-size:13px;font-weight:600}
  .skill-mini .se{font-size:11px;color:var(--muted)}
  ::-webkit-scrollbar{width:4px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>
<header>
  <h1>⚔ 技能系统</h1>
  <span id="hdr-count">加载中…</span>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-tabs">
      <button class="tab-btn active" onclick="switchMode('skills')">技能</button>
      <button class="tab-btn" onclick="switchMode('supports')">辅助</button>
    </div>
    <div class="search-box"><input id="search" placeholder="搜索名称/特性…" oninput="onSearch()"></div>
    <div class="tag-filter" id="tag-filter"></div>
    <div class="list" id="list"></div>
  </div>
  <div class="detail" id="detail"><div class="no-select">← 点击左侧列表查看详情</div></div>
</div>
<script>
const TC={投射物:'#f59e0b',范围:'#10b981',近战:'#ef4444',法术:'#8b5cf6',攻击:'#f97316',弓:'#84cc16',持续:'#06b6d4',召唤:'#a78bfa',光环:'#fbbf24',诅咒:'#c084fc',陷阱:'#fb923c',地雷:'#94a3b8',寒冷:'#38bdf8',火焰:'#f87171',闪电:'#facc15',混沌:'#d946ef',物理:'#9ca3af',毒素:'#4ade80',出血:'#dc2626',瞬间:'#e0e7ff',单体:'#6b7280',图腾:'#78716c',触发:'#c084fc',移动:'#34d399',链接:'#60a5fa'};
let allSkills=[],allSupports=[],allTags=[],mode='skills',selectedTag='',selectedId=null;
function tc(t){return TC[t]||'#888'}
function tagSpan(t,extra=''){return`<span class="tag" style="color:${tc(t)};border-color:${tc(t)};font-size:${extra?'9px':'10px'}">${t}</span>`}
function rReq(s){return(s.require_any||[]).map(t=>`<span class="req-tag req-any">${t}</span>`).join('')+(s.require_all||[]).map(t=>`<span class="req-tag req-all">必须:${t}</span>`).join('')+(s.exclude||[]).map(t=>`<span class="req-tag req-exc">排除:${t}</span>`).join('')}
async function init(){
  [allSkills,allSupports]=await Promise.all([fetch('/api/skills').then(r=>r.json()),fetch('/api/supports').then(r=>r.json())]);
  allTags=await fetch('/api/tags').then(r=>r.json());
  buildTagFilter();renderList();
  document.getElementById('hdr-count').textContent=`${allSkills.length} 个技能 · ${allSupports.length} 个辅助`;
}
function buildTagFilter(){
  const f=document.getElementById('tag-filter');
  if(mode!=='skills'){f.innerHTML='';return}
  f.innerHTML=allTags.map(t=>`<span class="tag-chip${selectedTag===t.tag?' active':''}" onclick="filterTag('${t.tag}')">${t.tag} <small style="opacity:.6">${t.count}</small></span>`).join('');
}
function filterTag(tag){selectedTag=selectedTag===tag?'':tag;buildTagFilter();renderList()}
function switchMode(m){mode=m;selectedTag='';document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&m==='skills')||(i===1&&m==='supports')));buildTagFilter();renderList()}
function onSearch(){renderList()}
function getFiltered(){
  const q=document.getElementById('search').value.toLowerCase().trim();
  if(mode==='skills')return allSkills.filter(s=>(!selectedTag||s.tags.includes(selectedTag))&&(!q||s.name.includes(q)||s.en.toLowerCase().includes(q)||s.tags.some(t=>t.includes(q))));
  return allSupports.filter(s=>!q||s.name.includes(q)||s.en.toLowerCase().includes(q));
}
function renderList(){
  const items=getFiltered(),list=document.getElementById('list');
  if(mode==='skills'){
    list.innerHTML=items.map(s=>`<div class="list-item${selectedId===s.id?' selected':''}" onclick="selectSkill(${s.id})"><div class="item-name">${s.name}</div><div class="item-en">${s.en}</div><div class="item-tags">${s.tags.map(t=>tagSpan(t)).join('')}</div></div>`).join('');
  }else{
    list.innerHTML=items.map(s=>`<div class="list-item${selectedId===s.id?' selected':''}" onclick="selectSupport(${s.id})"><div class="item-name">${s.name}</div><div class="item-en">${s.en}</div><div class="req-tags" style="margin-top:5px">${rReq(s)}</div></div>`).join('');
  }
}
async function selectSkill(id){
  selectedId=id;renderList();
  const data=await fetch(`/api/supports-for/${id}`).then(r=>r.json());
  const sk=data.skill,sp=data.supports;
  document.getElementById('detail').innerHTML=`
    <div class="detail-header">
      <h2>${sk.name} <span style="font-size:15px;color:#888">#${sk.id}</span></h2>
      <div class="en">${sk.en}</div>
      <div class="desc">${sk.desc}</div>
    </div>
    <div class="detail-tags">${sk.tags.map(t=>`<span class="detail-tag" style="color:${tc(t)};border-color:${tc(t)}" onclick="filterTag('${t}');switchMode('skills')">${t}</span>`).join('')}</div>
    <div class="stat-row">
      <div class="stat"><label>法力消耗</label><value>${sk.cost}</value></div>
      <div class="stat"><label>特性数量</label><value>${sk.tags.length}</value></div>
      <div class="stat"><label>可用辅助</label><value>${sp.length} / ${allSupports.length}</value></div>
    </div>
    <div class="section-title">可连接的辅助宝石 (${sp.length})</div>
    <div class="support-grid">${sp.map(s=>`<div class="support-card" onclick="selectSupport(${s.id});switchMode('supports')"><h4>${s.name}</h4><div class="s-en">${s.en}</div><div class="s-effect">✦ ${s.effect}</div><div class="s-desc">${s.desc}</div><div class="req-tags">${rReq(s)}</div></div>`).join('')}</div>
    ${sp.length===0?'<div style="color:var(--muted);font-size:14px;margin-top:10px">该技能暂无匹配辅助</div>':''}
  `;
}
async function selectSupport(id){
  selectedId=id;mode='supports';document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===1));renderList();
  const data=await fetch(`/api/skills-for-support/${id}`).then(r=>r.json());
  const sp=data.support,sk=data.skills;
  document.getElementById('detail').innerHTML=`
    <div class="detail-header">
      <h2 style="color:var(--accent2)">${sp.name} <span style="font-size:15px;color:#888">#${sp.id}</span></h2>
      <div class="en">${sp.en}</div>
      <div class="desc">${sp.desc}</div>
    </div>
    <div class="stat-row">
      <div class="stat"><label>效果</label><value style="font-size:13px">${sp.effect}</value></div>
      <div class="stat"><label>可支援技能</label><value>${sk.length} / ${allSkills.length}</value></div>
    </div>
    <div style="margin:10px 0">
      <div style="font-size:12px;color:var(--muted);margin-bottom:6px">需求特性：</div>
      <div class="req-tags" style="gap:6px">${rReq(sp)}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:8px">🟢 require_any: 含其中任一标签 &nbsp;🔵 require_all: 必须全部包含 &nbsp;🔴 exclude: 不能包含</div>
    </div>
    <div class="section-title">可被支援的技能 (${sk.length})</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px">
      ${sk.map(s=>`<div class="skill-mini" onclick="selectSkill(${s.id});switchMode('skills')"><div><div class="sn">${s.name}</div><div class="se">${s.en}</div><div class="item-tags" style="margin-top:3px">${s.tags.map(t=>tagSpan(t,'sm')).join('')}</div></div></div>`).join('')}
    </div>
  `;
}
init();
</script>
</body>
</html>
