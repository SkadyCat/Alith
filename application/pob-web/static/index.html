      row.innerHTML = `
        <span style="flex:1;font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${s.name}">${s.name}</span>
        <button onclick="event.stopPropagation();deleteSession('${s.name}')" style="background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:0;flex-shrink:0" title="删除">✕</button>
      `;
      row.addEventListener('click', () => loadSessionBuild(s));
      container.appendChild(row);
    });
  } catch(e) {
    container.innerHTML = '<div style="color:var(--text2);font-size:11px">加载失败</div>';
  }
}

async function loadSessionBuild(session) {
  document.getElementById('codeInput').value = session.code;
  await analyzeCode();
}

function openSessionModal() {
  document.getElementById('modalName').value = '';
  document.getElementById('modalCode').value = '';
  const m = document.getElementById('sessionModal');
  m.style.display = 'flex';
  setTimeout(() => document.getElementById('modalName').focus(), 50);
}

function closeSessionModal() {
  document.getElementById('sessionModal').style.display = 'none';
}

document.getElementById('sessionModal').addEventListener('click', function(e) {
  if (e.target === this) closeSessionModal();
});

async function saveSession() {
  const name = document.getElementById('modalName').value.trim();
  const code = document.getElementById('modalCode').value.trim();
  if (!name) { alert('请输入构筑名称'); return; }
  if (!code) { alert('请输入构筑代码或链接'); return; }
  try {
    const r = await fetch(API + '/api/sessions', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ name, code })
    });
    const d = await r.json();
    if (d.success) {
      closeSessionModal();
      await loadSessionList();
    } else {
      alert('保存失败');
    }
  } catch(e) {
    alert('保存失败: ' + e.message);
  }
}

async function deleteSession(name) {
  if (!confirm(`删除构筑「${name}」？`)) return;
  try {
    await fetch(API + `/api/sessions/${encodeURIComponent(name)}`, { method: 'DELETE' });
    await loadSessionList();
  } catch(e) {}
}

// ══ Stat Source Modal ══
function showStatSources(statId) {
  const b = window._currentBuild;
  if (!b) return;
  const sources = (b.stat_sources || {})[statId];
  const statMeta = (b.stats || []).find(s => s.id === statId);
  const statName = statMeta ? statMeta.name : statId;
  const statVal  = statMeta ? statMeta.value : '—';

  let html = '';

  // Nodes section
  const nodes = sources ? (sources.nodes || []) : [];
  const ORDER = {keystone:0, notable:1, normal:2};
  nodes.sort((a,b) => (ORDER[a.type]||2) - (ORDER[b.type]||2));

  html += `<div class="src-section">
    <div class="src-section-title">🌳 天赋树 <span class="src-section-count">${nodes.length} 个节点</span></div>`;
  if (nodes.length === 0) {
    html += `<div class="src-empty">该属性无天赋树来源</div>`;
  } else {
    nodes.forEach(nd => {
      const typeLabel = nd.type === 'keystone' ? '⬡ 天赋石' : nd.type === 'notable' ? '◆ 显赫' : '● 天赋';
      html += `<div class="src-node">
        <div class="src-node-name ${nd.type}">${typeLabel} ${escHtml(nd.name)}</div>
        ${nd.mods.map(m => `<div class="src-node-mod">${escHtml(m)}</div>`).join('')}
      </div>`;
    });
  }
  html += `</div>`;

  // Items section
  const items = sources ? (sources.items || []) : [];
  html += `<div class="src-section">
    <div class="src-section-title">⚔️ 装备 <span class="src-section-count">${items.length} 件</span></div>`;
  if (items.length === 0) {
    html += `<div class="src-empty">该属性无装备来源</div>`;
  } else {
    items.forEach(it => {
      const rc = it.rarity || 'Normal';
      html += `<div class="src-item rarity-${rc}">
        <div class="src-item-slot">${escHtml(it.slot)}</div>
        <div class="src-item-name ${rc}">${escHtml(it.name)}</div>
        ${it.mods.map(m => `<div class="src-item-mod">${escHtml(m)}</div>`).join('')}
      </div>`;
    });
  }
  html += `</div>`;

  // Gems section
  const gems = sources ? (sources.gems || []) : [];
  html += `<div class="src-section">
    <div class="src-section-title">💎 技能石 <span class="src-section-count">${gems.length} 个</span></div>`;
  if (gems.length === 0) {
    html += `<div class="src-empty">该属性无技能石来源</div>`;
  } else {
    gems.forEach(g => {
      const q = g.quality > 0 ? ` Q${g.quality}` : '';
      html += `<div class="src-node" style="border-left:3px solid var(--gem-active)">
        <div class="src-node-name notable">💎 ${escHtml(g.name)} L${g.level}${escHtml(q)}</div>
        <div class="src-node-mod" style="color:var(--text2);font-size:10px">插槽：${escHtml(g.slot)}</div>
        ${g.desc ? `<div class="src-node-mod">${escHtml(g.desc)}</div>` : ''}
      </div>`;
    });
  }
  html += `</div>`;

  // Build and show modal
  let modal = document.getElementById('statSrcModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'statSrcModal';
    modal.className = 'src-modal-overlay';
    modal.innerHTML = `
      <div class="src-modal">
        <div class="src-modal-head">
          <div>
            <div class="src-modal-title" id="srcModalTitle"></div>
            <div id="srcModalVal" style="font-size:11px;color:var(--text2);margin-top:2px"></div>
          </div>
          <button class="src-modal-close" onclick="closeStatSources()">✕</button>
        </div>
        <div class="src-modal-body" id="srcModalBody"></div>
      </div>`;
    document.body.appendChild(modal);
    modal.addEventListener('click', e => { if (e.target === modal) closeStatSources(); });
  }
  document.getElementById('srcModalTitle').textContent = `🔍 ${statName} 来源分析`;
  document.getElementById('srcModalVal').textContent = `当前数值：${statVal}`;
  document.getElementById('srcModalBody').innerHTML = html;
  modal.style.display = 'flex';
}

function closeStatSources() {
  const m = document.getElementById('statSrcModal');
  if (m) m.style.display = 'none';
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') { closeSessionModal(); closeStatSources(); }
});
</script>
