<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoB 构筑查看器</title>
  <style>
:root {
  --bg: #0f0d0a; --bg2: #1a1510; --bg3: #241e16; --border: #3d3020;
  --gold: #c8a24b; --gold2: #e8c56a; --text: #d4c4a0; --text2: #8a7a5a;
  --red: #e05050; --blue: #5080e0; --green: #50c050; --purple: #c050d0;
  --normal: #c8c8c8; --magic: #8888ff; --rare: #ffff77; --unique: #af6025;
  --gem-active: #1aa7ec; --gem-support: #d02090;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', '微软雅黑', sans-serif; height: 100vh; overflow: hidden; }

/* ═══ 3-panel layout ═══ */
.layout { display: flex; height: 100vh; overflow: hidden; }

/* Left Menu */
.left-menu { width: 240px; min-width: 200px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.left-header { background: linear-gradient(135deg, #1a1205, #2a1e0a); border-bottom: 2px solid var(--gold); padding: 14px 16px; flex-shrink: 0; }
.left-title { font-size: 16px; color: var(--gold2); letter-spacing: 1px; font-weight: bold; }
.left-subtitle { font-size: 11px; color: var(--text2); margin-top: 3px; }
.left-body { flex: 1; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.section-label { font-size: 11px; color: var(--text2); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 5px; }
.section-block { display: flex; flex-direction: column; }
.full-select { width: 100%; background: #0a0806; border: 1px solid var(--border); color: var(--text); padding: 7px 9px; font-size: 12px; border-radius: 4px; outline: none; cursor: pointer; }
.full-select:focus { border-color: var(--gold); }
.full-select option { background: #1a1510; }
.full-textarea { width: 100%; background: #0a0806; border: 1px solid var(--border); color: var(--text); padding: 8px 10px; font-family: monospace; font-size: 11px; border-radius: 4px; outline: none; resize: vertical; min-height: 75px; }
.full-textarea:focus { border-color: var(--gold); }
.btn { padding: 8px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: bold; transition: all 0.2s; width: 100%; margin-top: 6px; }
.btn-primary { background: linear-gradient(135deg, #8a6020, #c8a24b); color: #0f0d0a; }
.btn-primary:hover { background: linear-gradient(135deg, #c8a24b, #e8c56a); }
.btn-secondary { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }
.btn-secondary:hover { border-color: var(--gold); color: var(--gold); }
.btn-sm { padding: 5px 10px; font-size: 11px; }
.divider { border-top: 1px solid var(--border); margin: 4px 0; }
.loading-inline { display: flex; align-items: center; gap: 8px; color: var(--text2); font-size: 12px; padding: 4px 0; }
.error-msg { background: rgba(180,40,40,0.15); border: 1px solid #b02020; padding: 8px 10px; border-radius: 4px; color: #ff8888; font-size: 12px; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }

/* Overview section in left panel */
.overview-char { background: var(--bg3); border: 1px solid var(--border); border-left: 3px solid var(--gold); padding: 10px 12px; border-radius: 3px; margin-bottom: 8px; }
.overview-name { font-size: 15px; color: var(--gold2); font-weight: bold; }
.overview-meta { font-size: 11px; color: var(--text2); margin-top: 3px; }
.overview-stats { display: flex; flex-direction: column; gap: 3px; margin-top: 8px; }
.ov-stat { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
.ov-stat-name { color: var(--text2); }
.ov-stat-val { color: var(--gold2); font-family: monospace; font-weight: bold; }

/* Center Area */
.center-area { flex: 1; position: relative; overflow: hidden; background: #080604; }
#treeCanvas { position: absolute; top: 0; left: 0; cursor: grab; }
#treeCanvas:active { cursor: grabbing; }
.tree-controls-overlay { position: absolute; top: 46px; left: 10px; display: flex; gap: 6px; align-items: center; z-index: 10; }
.ctrl-btn { background: rgba(26,21,16,0.85); border: 1px solid var(--border); color: var(--text); width: 30px; height: 30px; border-radius: 4px; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
.ctrl-btn:hover { border-color: var(--gold); color: var(--gold); }
.ctrl-info { font-size: 11px; color: var(--text2); background: rgba(26,21,16,0.75); padding: 4px 8px; border-radius: 4px; max-width: 400px; }
.welcome-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; pointer-events: none; }
.welcome-center h2 { font-size: 22px; color: var(--gold); margin-bottom: 10px; }
.welcome-center p { color: var(--text2); font-size: 13px; }

/* Right Info Panel */
.right-info { width: 300px; min-width: 260px; background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.right-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg3); flex-shrink: 0; }
.rtab { flex: 1; padding: 9px 4px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text2); cursor: pointer; font-size: 12px; transition: all 0.2s; }
.rtab:hover { color: var(--text); }
.rtab.active { color: var(--gold2); border-bottom-color: var(--gold); }
.right-content { flex: 1; overflow-y: auto; }
.rtab-panel { display: none; padding: 10px 12px; }
.rtab-panel.active { display: block; }
.empty-panel { color: var(--text2); font-size: 12px; text-align: center; padding: 30px 16px; }
.node-hover { background: var(--bg3); border-top: 1px solid var(--border); padding: 10px 12px; font-size: 12px; flex-shrink: 0; min-height: 60px; max-height: 160px; overflow-y: auto; }
.node-hover-name { color: var(--gold2); font-weight: bold; margin-bottom: 4px; }
.node-hover-type { color: var(--text2); font-size: 11px; margin-bottom: 4px; }
.node-hover-mods { color: var(--text); line-height: 1.5; }

/* Cards used in right panel */
.card { background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.card-header { background: linear-gradient(90deg, var(--bg3), var(--bg2)); padding: 8px 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.card-title { font-size: 12px; color: var(--gold); letter-spacing: 1px; text-transform: uppercase; font-weight: bold; }
.card-body { padding: 10px 12px; }

/* Stats */
.stats-grid { display: flex; flex-direction: column; gap: 3px; }
.stat-item { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 6px 10px; display: flex; align-items: center; gap: 8px; }
.stat-icon { font-size: 15px; line-height: 1; }
.stat-info { flex: 1; min-width: 0; }
.stat-name { font-size: 11px; color: var(--text2); }
.stat-value { font-size: 14px; color: var(--gold2); font-weight: bold; font-family: monospace; }
.stat-section { margin-bottom: 10px; }
.stat-section-title { font-size: 11px; color: var(--text2); letter-spacing: 1px; margin-bottom: 4px; padding-bottom: 3px; border-bottom: 1px solid var(--border); }

/* Skills */
.skill-group { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 8px 10px; margin-bottom: 6px; }
.skill-slot { font-size: 11px; color: var(--gold); margin-bottom: 6px; letter-spacing: 1px; display: flex; align-items: center; gap: 4px; }
.skill-slot .label { color: var(--text2); font-style: italic; }
.gem { display: flex; align-items: center; gap: 6px; padding: 3px 0; border-bottom: 1px solid rgba(61,48,32,0.4); }
.gem:last-child { border-bottom: none; }
.gem-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.gem-dot.active { background: var(--gem-active); box-shadow: 0 0 3px var(--gem-active); }
.gem-dot.support { background: var(--gem-support); box-shadow: 0 0 3px var(--gem-support); }
.gem-dot.disabled { background: var(--text2); opacity: 0.4; }
.gem-name { flex: 1; font-size: 12px; }
.gem-name.disabled { opacity: 0.4; }
.gem-lvl { font-size: 10px; color: var(--text2); font-family: monospace; white-space: nowrap; }
.gem-lvl .quality { color: var(--green); }

/* Items */
.item-card { background: var(--bg); border-radius: 3px; padding: 8px 10px; position: relative; overflow: hidden; margin-bottom: 4px; }
.item-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
.item-card.rarity-Normal::before { background: var(--normal); }
.item-card.rarity-Magic::before { background: var(--magic); }
.item-card.rarity-Rare::before { background: var(--rare); }
.item-card.rarity-Unique::before { background: var(--unique); }
.item-card { border: 1px solid var(--border); }
.item-card.rarity-Magic { border-color: rgba(136,136,255,0.3); }
.item-card.rarity-Rare { border-color: rgba(255,255,119,0.3); }
.item-card.rarity-Unique { border-color: rgba(175,96,37,0.4); }
.item-slot-label { font-size: 10px; color: var(--text2); letter-spacing: 1px; margin-bottom: 3px; }
.item-name { font-size: 12px; font-weight: bold; margin-bottom: 2px; }
.item-name.Normal { color: var(--normal); }
.item-name.Magic { color: var(--magic); }
.item-name.Rare { color: var(--rare); }
.item-name.Unique { color: var(--unique); }
.item-base { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
.item-mods { font-size: 11px; color: #88aacc; }
.item-mod { line-height: 1.4; }

/* Tree summary in right panel */
.tree-specs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
.tree-spec { background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 10px 14px; text-align: center; flex: 1; min-width: 80px; }
.tree-spec-title { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.tree-spec-count { font-size: 28px; color: var(--gold2); font-weight: bold; font-family: monospace; line-height: 1; }
.tree-spec-label { font-size: 10px; color: var(--text2); margin-top: 3px; }

/* Notes */
.notes-text { font-size: 12px; color: var(--text2); line-height: 1.7; white-space: pre-wrap; background: var(--bg); padding: 10px; border-radius: 3px; border: 1px solid var(--border); }

/* ═══ Character Equipment View (full redesign) ═══ */
#charEquipView { position:absolute; top:36px; left:0; right:0; bottom:0; z-index:40; background:#080604; display:none; flex-direction:column; overflow:hidden; }
.ceq-topbar { display:flex; align-items:center; gap:12px; padding:8px 16px; background:var(--bg2); border-bottom:1px solid var(--border); flex-shrink:0; }
.ceq-back { background:var(--bg3); border:1px solid var(--border); color:var(--text); padding:4px 12px; border-radius:4px; cursor:pointer; font-size:12px; }
.ceq-back:hover { border-color:var(--gold); color:var(--gold); }
.ceq-title { font-size:13px; color:var(--gold2); font-weight:bold; letter-spacing:1px; }
.ceq-body { flex:1; overflow-y:auto; padding:16px 20px; }
/* Character grid */
.ceq-char-grid {
  display:grid;
  grid-template-columns: 1fr 1fr 1fr;
  grid-template-rows: auto;
  gap:8px;
  grid-template-areas:
    ".      helm    ."
    "weap1  chest   weap2"
    "ring1  belt    amulet"
    "ring2  gloves  ."
    ".      boots   ."
    "f1     f2      f3"
    "f4     f5      ."; }
.ceq-item-card { border-radius:4px; padding:8px 10px; position:relative; overflow:hidden; border:1px solid var(--border); }
.ceq-item-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:3px; }
.ceq-item-card.rarity-Normal::before { background:var(--normal); }
.ceq-item-card.rarity-Magic::before { background:var(--magic); }
.ceq-item-card.rarity-Rare::before { background:var(--rare); }
.ceq-item-card.rarity-Unique::before { background:var(--unique); }
.ceq-item-card.rarity-Magic { border-color:rgba(136,136,255,0.3); }
.ceq-item-card.rarity-Rare { border-color:rgba(255,255,119,0.3); }
.ceq-item-card.rarity-Unique { border-color:rgba(175,96,37,0.4); }
.ceq-item-card.empty-slot { background:rgba(255,255,255,0.02); border-style:dashed; opacity:0.4; }
.ceq-slot-lbl { font-size:9px; color:var(--text2); letter-spacing:1px; text-transform:uppercase; margin-bottom:3px; }
.ceq-item-nm { font-size:12px; font-weight:bold; margin-bottom:2px; line-height:1.3; }
.ceq-item-nm.Normal { color:var(--normal); }
.ceq-item-nm.Magic { color:var(--magic); }
.ceq-item-nm.Rare { color:var(--rare); }
.ceq-item-nm.Unique { color:var(--unique); }
.ceq-item-nm.empty-nm { color:var(--text2); font-style:italic; font-weight:normal; font-size:11px; }
.ceq-item-bse { font-size:10px; color:var(--text2); margin-bottom:4px; }
.ceq-item-mods { font-size:10px; color:#88aacc; line-height:1.5; }
.ceq-item-mod { padding:0; }
/* Flask row — smaller cards */
.ceq-flask-card { min-height:0; }
.ceq-flask-card .ceq-item-mods { display:none; }
/* Center top menu */
#centerTopMenu { display:none; }
.ctab { flex:1; background:none; border:none; border-right:1px solid var(--border); border-bottom:2px solid transparent; color:var(--text2); cursor:pointer; font-size:12px; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:4px; padding:0 8px; }
.ctab:last-child { border-right:none; }
.ctab:hover { color:var(--text); background:rgba(200,162,75,0.05); }
.ctab.active { color:var(--gold2); border-bottom-color:var(--gold); background:rgba(200,162,75,0.08); }
/* Skills View */
.skill-dmg-section { margin-bottom:20px; }
.skill-dmg-title { font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;padding-bottom:5px;border-bottom:1px solid var(--border);margin-bottom:10px; }
.skill-dmg-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:8px; }
.skill-dmg-card { background:var(--bg2); border:1px solid var(--border); border-radius:4px; padding:10px 14px; }
.skill-dmg-name { font-size:10px; color:var(--text2); margin-bottom:3px; }
.skill-dmg-val { font-size:18px; color:var(--gold2); font-weight:bold; font-family:monospace; }
.skill-dmg-sub { font-size:10px; color:var(--text2); margin-top:2px; }
/* Tooltip bubble */
.tip-name { font-size: 14px; color: var(--gold2); font-weight: bold; margin-bottom: 5px; }
.tip-type { font-size: 11px; color: var(--text2); margin-bottom: 6px; letter-spacing: 0.5px; }
.tip-mods { border-top: 1px solid var(--border); padding-top: 6px; }
.tip-mod { font-size: 12px; color: var(--text); line-height: 1.6; padding: 1px 0; }

/* Damage breakdown card */
.dmg-breakdown-card { background:var(--bg3);border:1px solid var(--border);border-radius:6px;margin-bottom:8px;overflow:hidden }
.dmg-header { padding:8px 12px;background:linear-gradient(135deg,#1c1206,#241a08);border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--gold);font-weight:bold;user-select:none }
.dmg-header:hover { background:linear-gradient(135deg,#261a08,#30220a) }
.dmg-toggle { font-size:10px;color:var(--text2) }
.dmg-body { padding:8px }
.dmg-step { background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:7px 10px;margin-bottom:6px }
.dmg-step.dmg-result { border-color:var(--gold);background:rgba(200,162,75,0.06) }
.dmg-step-label { font-size:10px;color:var(--text2);margin-bottom:4px;letter-spacing:0.5px }
.dmg-formula { display:flex;align-items:center;gap:8px;flex-wrap:wrap }
.dmg-base { font-size:13px;color:var(--text);font-weight:bold }
.dmg-op { font-size:11px;color:var(--text2) }
.dmg-val { font-size:14px;color:var(--gold2);font-weight:bold }
.dmg-detail { font-size:11px;color:var(--text2);margin-top:4px }
.dmg-inc-badge { font-size:10px;color:var(--green);background:rgba(80,192,80,0.12);padding:1px 5px;border-radius:3px;margin-left:4px }
.dmg-detail-btn { font-size:10px;background:none;border:1px solid var(--border);color:var(--text2);cursor:pointer;padding:1px 5px;border-radius:3px;margin-left:6px }
.dmg-detail-btn:hover { border-color:var(--gold);color:var(--gold) }
.dmg-inc-detail { margin-top:6px;padding-top:6px;border-top:1px solid var(--border) }
.dmg-src-group { font-size:10px;color:var(--text2);margin:5px 0 3px;letter-spacing:0.5px }
.dmg-src-row { display:flex;gap:6px;align-items:baseline;padding:2px 0;font-size:11px;line-height:1.4 }
.dmg-src-pct { color:var(--green);font-weight:bold;min-width:38px;flex-shrink:0 }
.dmg-src-name { color:var(--text);min-width:70px;max-width:100px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
.dmg-src-mod { color:var(--text2);flex:1;font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
.match-good { font-size:11px;color:var(--green);margin-left:6px }
.match-off { font-size:11px;color:var(--red);margin-left:6px }

/* Damage View Tree (center panel) */
.dvt-tree { padding:16px 20px;position:relative;font-size:13px }
.dvt-root { display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(200,162,75,0.1);border:1px solid var(--gold);border-radius:8px;margin-bottom:10px }
.dvt-root-icon { font-size:18px }
.dvt-root-label { font-size:15px;color:var(--text2) }
.dvt-root-val { font-size:22px;font-weight:bold;color:#fff }
.dvt-match { font-size:12px;padding:2px 8px;border-radius:10px;margin-left:auto;white-space:nowrap }
.dvt-match.good { background:rgba(80,192,80,0.15);color:var(--green) }
.dvt-match.off { background:rgba(224,80,80,0.15);color:var(--red) }
/* Tree structure */
.dvt-branches { position:relative;margin-left:14px;padding-left:0;border-left:2px solid #3a3025 }
.dvt-branch { position:relative;margin-bottom:3px }
.dvt-branch::before { content:'';position:absolute;left:-14px;top:20px;width:12px;height:2px;background:#3a3025 }
.dvt-branch.dvt-last { /* last branch - line stops */ }
/* Node (parent row) */
.dvt-node { display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:6px;cursor:pointer;transition:border-color 0.15s,background 0.15s;user-select:none }
.dvt-node:hover { border-color:var(--gold);background:rgba(200,162,75,0.07) }
.dvt-icon { font-size:14px;flex-shrink:0 }
.dvt-nlabel { color:var(--text);flex:1 }
.dvt-nav { font-size:10px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0 }
.dvt-node:hover .dvt-nav { border-color:var(--gold);color:var(--gold) }
/* Children */
.dvt-children { margin-left:26px;border-left:2px solid #2a2a2a;padding-left:0;margin-top:3px;margin-bottom:3px;display:flex;flex-direction:column;gap:2px }
.dvt-child { position:relative;display:flex;align-items:center;gap:8px;padding:5px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:border-color 0.15s;font-size:12px }
.dvt-child::before { content:'';position:absolute;left:-26px;top:50%;width:22px;height:2px;background:#2a2a2a }
.dvt-child:hover { border-color:var(--gold);background:rgba(200,162,75,0.06) }
.dvt-cnav { font-size:10px;color:var(--text2);background:var(--bg3);border:1px solid var(--border);padding:1px 5px;border-radius:3px;white-space:nowrap;flex-shrink:0;margin-left:auto }
.dvt-child:hover .dvt-cnav { border-color:var(--gold);color:var(--gold) }
/* Hover card (fixed) */
.dvt-card { position:fixed;z-index:600;background:#12100c;border:1px solid var(--gold);border-radius:8px;padding:12px 14px;min-width:220px;max-width:300px;display:none;box-shadow:0 4px 20px rgba(0,0,0,0.75);pointer-events:none }
.dvt-ct { font-size:14px;color:var(--gold2);font-weight:bold;margin-bottom:6px }
.dvt-cs { font-size:11px;color:var(--text2);margin-bottom:8px }
.dvt-cr { font-size:12px;color:var(--text);margin-bottom:3px }
.dvt-cm { font-size:12px;color:#88aacc;margin-top:6px;line-height:1.5 }
.dvt-ch { font-size:10px;color:var(--text2);margin-top:8px;padding-top:6px;border-top:1px solid var(--border) }

/* Stat source modal */
.src-modal-overlay { position:fixed;inset:0;z-index:900;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center }
.src-modal { background:var(--bg2);border:1px solid var(--gold);border-radius:8px;width:520px;max-width:95vw;max-height:82vh;display:flex;flex-direction:column;overflow:hidden }
.src-modal-head { padding:12px 16px;background:linear-gradient(135deg,#1a1205,#2a1e0a);border-bottom:1px solid var(--gold);display:flex;align-items:center;justify-content:space-between;flex-shrink:0 }
.src-modal-title { font-size:14px;color:var(--gold2);font-weight:bold }
.src-modal-close { background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer;line-height:1;padding:0 4px }
.src-modal-close:hover { color:var(--gold) }
.src-modal-body { flex:1;overflow-y:auto;padding:12px 16px }
.src-section { margin-bottom:14px }
.src-section-title { font-size:11px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:6px }
.src-section-count { background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:1px 7px;font-size:10px;color:var(--gold) }
.src-node { background:var(--bg3);border:1px solid var(--border);border-radius:3px;padding:7px 10px;margin-bottom:5px }
.src-node-name { font-size:12px;font-weight:bold;margin-bottom:3px }
.src-node-name.notable { color:var(--gold2) }
.src-node-name.keystone { color:#ffd700 }
.src-node-name.normal { color:var(--text) }
.src-node-mod { font-size:11px;color:#88aacc;line-height:1.5;padding:1px 0 }
.src-item { background:var(--bg);border-radius:3px;padding:7px 10px;margin-bottom:5px;position:relative;overflow:hidden;border:1px solid var(--border) }
.src-item::before { content:'';position:absolute;left:0;top:0;bottom:0;width:3px }
.src-item.rarity-Normal::before { background:var(--normal) }
.src-item.rarity-Magic::before { background:var(--magic) }
.src-item.rarity-Rare::before { background:var(--rare) }
.src-item.rarity-Unique::before { background:var(--unique) }
.src-item-slot { font-size:10px;color:var(--text2);letter-spacing:1px }
.src-item-name { font-size:12px;font-weight:bold;margin-bottom:3px }
.src-item-name.Normal { color:var(--normal) }
.src-item-name.Magic { color:var(--magic) }
.src-item-name.Rare { color:var(--rare) }
.src-item-name.Unique { color:var(--unique) }
.src-item-mod { font-size:11px;color:#88aacc;line-height:1.5;padding:1px 0 }
.src-empty { color:var(--text2);font-size:11px;font-style:italic;padding:4px 0 }
/* Clickable stat items */
.stat-item { cursor:pointer }
.stat-item:hover { border-color:var(--gold);background:rgba(200,162,75,0.06) }
.stat-item-src-btn { font-size:10px;color:var(--text2);opacity:0;transition:opacity 0.15s;margin-left:4px;flex-shrink:0 }
.stat-item:hover .stat-item-src-btn { opacity:1;color:var(--gold) }
  </style>
</head>
<body>
<div class="layout">

  <!-- ══ LEFT MENU ══ -->
  <div class="left-menu">
    <div class="left-header">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="left-title">⚗️ PoB 查看器</div>
          <div class="left-subtitle">Path of Building 网页版</div>
        </div>
        <button class="ctrl-btn" onclick="openSessionModal()" title="新增构筑" style="width:28px;height:28px;font-size:18px;flex-shrink:0">＋</button>
      </div>
    </div>
    <div class="left-body">

      <!-- Session list -->
      <div class="section-block">
        <div class="section-label">已保存构筑</div>
        <div id="sessionList" style="display:flex;flex-direction:column;gap:4px;max-height:180px;overflow-y:auto">
          <div style="color:var(--text2);font-size:11px">加载中…</div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section-block">
        <div class="section-label">从文档库选择</div>
        <select id="buildSelect" class="full-select">
          <option value="">— 加载中… —</option>
        </select>
        <button class="btn btn-secondary btn-sm" onclick="loadSelectedBuild()">📂 读取文档</button>
      </div>

      <div class="divider"></div>

      <div class="section-block">
        <div class="section-label">粘贴构筑代码</div>
        <textarea id="codeInput" class="full-textarea" placeholder="粘贴 PoB 代码 (eNrt...)"></textarea>
        <button class="btn btn-primary" onclick="analyzeCode()">⚔️ 分析构筑</button>
      </div>

      <div id="errorMsg" class="error-msg" style="display:none"></div>
      <div id="loadingDiv" class="loading-inline" style="display:none">
        <div class="spinner"></div> 解析中…
      </div>

      <!-- Build overview shown after analysis -->
      <div id="buildOverview" style="display:none">
        <div class="divider"></div>
        <div id="overviewContent"></div>
      </div>

    </div>
  </div>

<!-- ══ SESSION MODAL ══ -->
<div id="sessionModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.7);display:none;align-items:center;justify-content:center">
  <div style="background:var(--bg2);border:1px solid var(--gold);border-radius:8px;padding:20px;width:420px;max-width:90vw">
    <div style="font-size:15px;color:var(--gold2);font-weight:bold;margin-bottom:14px">＋ 新增构筑</div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:4px">构筑名称</div>
    <input id="modalName" type="text" placeholder="例：冬潮烙印女巫" style="width:100%;background:#0a0806;border:1px solid var(--border);color:var(--text);padding:7px 9px;font-size:13px;border-radius:4px;outline:none;margin-bottom:10px">
    <div style="font-size:11px;color:var(--text2);margin-bottom:4px">PoB 代码 / 链接</div>
    <textarea id="modalCode" placeholder="粘贴 PoB 代码 (eNrt...) 或 pastebin 链接" style="width:100%;background:#0a0806;border:1px solid var(--border);color:var(--text);padding:8px 10px;font-family:monospace;font-size:11px;border-radius:4px;outline:none;resize:vertical;min-height:90px;margin-bottom:12px"></textarea>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button onclick="closeSessionModal()" style="background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px">取消</button>
      <button onclick="saveSession()" style="background:linear-gradient(135deg,#8a6020,#c8a24b);border:none;color:#0f0d0a;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:bold">💾 保存</button>
    </div>
  </div>
</div>

  <!-- ══ CENTER: Passive Tree ══ -->
  <div class="center-area" id="treeContainer">
    <!-- Top menu bar (shown after build loaded) -->
    <div id="centerTopMenu" style="display:none;position:absolute;top:0;left:0;right:0;z-index:60;background:var(--bg2);border-bottom:1px solid var(--border);height:36px;align-items:stretch;">
      <button class="ctab active" id="ctab-tree"   onclick="switchCTab('tree',this)">🌳 天赋树</button>
      <button class="ctab"        id="ctab-equip"  onclick="switchCTab('equip',this)">⚔️ 装备</button>
      <button class="ctab"        id="ctab-skills" onclick="switchCTab('skills',this)">💎 技能</button>
      <button class="ctab"        id="ctab-damage" onclick="switchCTab('damage',this)">📊 伤害</button>
    </div>
    <div id="nodeTooltip" style="display:none;position:fixed;z-index:200;background:rgba(15,13,10,0.97);border:1px solid var(--gold);border-radius:5px;padding:10px 14px;pointer-events:none;max-width:280px;box-shadow:0 4px 20px rgba(0,0,0,0.8)"></div>
    <canvas id="treeCanvas"></canvas>
    <div class="tree-controls-overlay" id="treeControlsOverlay" style="display:none">
      <button class="ctrl-btn" onclick="zoomTree(1.3)" title="放大">＋</button>
      <button class="ctrl-btn" onclick="zoomTree(0.77)" title="缩小">－</button>
      <button class="ctrl-btn" onclick="resetTreeView()" title="重置">⊙</button>
      <span class="ctrl-info" id="treeInfo"></span>
    </div>
    <div id="welcomeDiv" class="welcome-center">
      <h2>⚗️ PoB 天赋树查看器</h2>
      <p>在左侧粘贴构筑代码或从文档库选择构筑</p>
      <p style="margin-top:8px;color:var(--text2);font-size:12px">基于 PoeCharm3 汉化架构 · 完整树渲染</p>
    </div>

    <!-- ══ CHARACTER EQUIP VIEW ══ -->
    <div id="charEquipView">
      <div class="ceq-body" style="flex:1;overflow-y:auto;padding:12px 16px">
        <div style="font-size:11px;color:var(--text2);margin-bottom:8px" id="ceqCharName"></div>
        <div class="ceq-char-grid" id="ceqGrid"></div>
      </div>
    </div>

    <!-- ══ SKILLS VIEW ══ -->
    <div id="skillsView" style="display:none;position:absolute;inset:0;top:36px;background:#080604;overflow-y:auto;z-index:40;padding:16px 20px">
      <div id="skillsViewContent"></div>
    </div>

    <!-- ══ DAMAGE VIEW ══ -->
    <div id="dmgView" style="display:none;position:absolute;inset:0;top:36px;background:#080604;overflow-y:auto;z-index:40;padding:16px 20px">
      <div id="dmgViewContent"><div style="color:var(--text2);text-align:center;padding:40px">加载构筑后显示伤害分解</div></div>
    </div>

  </div>

  <!-- ══ RIGHT: Stats Panel (always-on) ══ -->
  <div class="right-info">
    <div class="right-header" style="padding:8px 12px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0">
      <div style="font-size:11px;color:var(--gold);letter-spacing:1px;font-weight:bold">📊 角色属性</div>
    </div>
    <div class="right-content" style="flex:1;overflow-y:auto">
      <div id="statsPanel" style="padding:10px 12px"><div class="empty-panel">分析构筑后显示属性</div></div>
    </div>
    <div class="node-hover" id="nodeHoverInfo" style="display:none">
      <div class="node-hover-name" id="nhName"></div>
      <div class="node-hover-type" id="nhType"></div>
      <div class="node-hover-mods" id="nhMods"></div>
    </div>
  </div>

</div>
<script>const API = '';

async function loadBuildList() {
  try {
    const r = await fetch(API + '/api/pob-list');
    const d = await r.json();
    const sel = document.getElementById('buildSelect');
    sel.innerHTML = '<option value="">— 选择构筑 —</option>';
    (d.builds || []).forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.path;
      opt.textContent = b.name;
      sel.appendChild(opt);
    });
  } catch(e) {
    document.getElementById('buildSelect').innerHTML = '<option value="">— 加载失败 —</option>';
  }
}

async function loadSelectedBuild() {
  const docPath = document.getElementById('buildSelect').value;
  if (!docPath) return;
  showLoading();
  try {
    const r = await fetch(API + '/api/analyze/doc', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({doc_path: docPath})
    });
    const d = await r.json();
    if (d.success) renderBuild(d.build);
    else showError(d.error);
  } catch(e) { showError(e.message); }
}

async function analyzeCode() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) { showError('请先粘贴构筑代码'); return; }
  showLoading();
  try {
    const r = await fetch(API + '/api/analyze/code', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({code})
    });
    const d = await r.json();
    if (d.success) renderBuild(d.build);
    else showError(d.error + (d.trace ? '\n' + d.trace : ''));
  } catch(e) { showError(e.message); }
}

function showLoading() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('loadingDiv').style.display = 'flex';
}
function showError(msg) {
  document.getElementById('loadingDiv').style.display = 'none';
  const el = document.getElementById('errorMsg');
  el.textContent = '❌ ' + msg;
  el.style.display = 'block';
}
function hideLoading() {
  document.getElementById('loadingDiv').style.display = 'none';
}

function fmtNum(v) {
  if (v === null || v === undefined) return '-';
  return String(v);
}

const RARITY_CLASS = {
  'Normal': 'rarity-Normal', 'Magic': 'rarity-Magic',
  'Rare': 'rarity-Rare', 'Unique': 'rarity-Unique',
};

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderBuild(b) {
  hideLoading();
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('welcomeDiv').style.display = 'none';

  // === LEFT: Build Overview ===
  const keyStatIds = ['life','es','dps','total_dps','life_regen'];
  const keyStats = (b.stats || []).filter(s =>
    keyStatIds.includes((s.id||'').toLowerCase()) ||
    ['生命','能量护盾','伤害','DPS','总DPS'].includes(s.name)
  ).slice(0, 6);

  let ovHtml = '<div class="overview-char">';
  ovHtml += '<div class="overview-name">' + escHtml(b.class) + ' · ' + escHtml(b.ascendancy || '未升华') + '</div>';
  ovHtml += '<div class="overview-meta">等级 ' + b.level + ' · 已配置 ' + b.tree.total_nodes + ' 天赋点</div>';
  if (keyStats.length) {
    ovHtml += '<div class="overview-stats">';
    keyStats.forEach(s => {
      ovHtml += '<div class="ov-stat"><span class="ov-stat-name">' + escHtml(s.name) + '</span>';
      ovHtml += '<span class="ov-stat-val">' + escHtml(fmtNum(s.value)) + '</span></div>';
    });
    ovHtml += '</div>';
  }
  ovHtml += '</div>';
  ovHtml += '<button class="btn btn-secondary btn-sm" onclick="openInPob()" style="margin-top:6px">🖥️ 在 PoB 中打开</button>';

  document.getElementById('overviewContent').innerHTML = ovHtml;
  document.getElementById('buildOverview').style.display = 'block';

  // === RIGHT: Stats panel (always-on) ===
  document.getElementById('statsPanel').innerHTML = renderStats(b.stats);

  window._currentBuild = b;
  window._treeLoaded = false;

  // If damage tab currently visible, refresh it (must be after _currentBuild is set)
  if (document.getElementById('dmgView').style.display !== 'none') _showDmgView();

  // Show center top menu
  const topMenu = document.getElementById('centerTopMenu');
  topMenu.style.display = 'flex';

  // Default: show tree tab
  switchCTab('tree', document.getElementById('ctab-tree'));
  loadTreeCanvas();
}

// ══ Center tab switching ══
function switchCTab(name, btn) {
  document.querySelectorAll('.ctab').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const canvas = document.getElementById('treeCanvas');
  const overlay = document.getElementById('treeControlsOverlay');
  const ceqView = document.getElementById('charEquipView');
  const skView  = document.getElementById('skillsView');
  const dmgView = document.getElementById('dmgView');

  // Hide all center panels first
  ceqView.style.display = 'none';
  skView.style.display  = 'none';
  dmgView.style.display = 'none';
  canvas.style.visibility = '';

  if (name === 'equip') {
    overlay.style.display = 'none';
    canvas.style.visibility = 'hidden';
    _showCharEquipGrid();
  } else if (name === 'skills') {
    overlay.style.display = 'none';
    canvas.style.visibility = 'hidden';
    _showSkillsView();
  } else if (name === 'damage') {
    overlay.style.display = 'none';
    canvas.style.visibility = 'hidden';
    _showDmgView();
  } else {
    // tree
    overlay.style.display = window._treeLoaded ? 'flex' : 'none';
  }
}

function _showCharEquipGrid() {
  const b = window._currentBuild;
  if (!b) return;
  const itemMap = {};
  (b.items || []).forEach(it => { itemMap[it.slot] = it; });
  let html = '';
  CEQ_SLOT_ORDER.forEach(slot => {
    if (!CEQ_SLOT_AREAS[slot]) return;
    html += buildCeqItemCard(slot, itemMap[slot] || null);
  });
  document.getElementById('ceqGrid').innerHTML = html;
  document.getElementById('ceqCharName').textContent = `${b.class} · ${b.ascendancy || ''} Lv${b.level}`;
  document.getElementById('charEquipView').style.display = 'flex';
  document.getElementById('charEquipView').style.flexDirection = 'column';
}

function _showSkillsView() {
  const b = window._currentBuild;
  if (!b) return;
  const sv = document.getElementById('skillsView');
  sv.style.display = 'block';
  document.getElementById('skillsViewContent').innerHTML = renderSkillsPage(b);
}

function renderSkillsPage(b) {
  let html = '';

  // ── Main skill group ──
  const mg = b.main_skill_group;
  if (mg) {
    html += `<div class="skill-dmg-section">
      <div class="skill-dmg-title">⚔️ 主技能配置</div>
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:10px 14px;margin-bottom:8px">
        <div style="font-size:11px;color:var(--text2);margin-bottom:6px">插槽：${escHtml(mg.slot || '—')}</div>`;
    (mg.gems || []).forEach(g => {
      const dotCls = !g.enabled ? 'disabled' : g.is_support ? 'support' : 'active';
      const cn = g.cn !== g.name ? g.cn : g.name;
      const q = g.quality > 0 ? ` <span style="color:var(--green)">Q${g.quality}</span>` : '';
      html += `<div class="gem"><div class="gem-dot ${dotCls}"></div>
        <div class="gem-name${g.enabled?'':' disabled'}">${escHtml(cn)}</div>
        <div class="gem-lvl">L${g.level}${q}</div></div>`;
    });
    html += `</div></div>`;
  }

  // ── All skill groups ──
  const enabledSkills = (b.skills || []).filter(sg => sg.enabled);
  if (enabledSkills.length > 1) {
    html += `<div class="skill-dmg-section">
      <div class="skill-dmg-title">💎 全部技能配置</div>`;
    enabledSkills.forEach(sg => {
      if (mg && sg.slot_en === mg.slot_en && JSON.stringify(sg.gems) === JSON.stringify(mg.gems)) return;
      const slotLabel = sg.slot || '未知插槽';
      const grpLabel = sg.label ? `「${sg.label}」` : '';
      html += `<div class="skill-group" style="margin-bottom:6px">
        <div class="skill-slot">🔷 ${slotLabel} <span class="label">${grpLabel}</span></div>`;
      sg.gems.forEach(g => {
        const dotCls = !g.enabled ? 'disabled' : g.is_support ? 'support' : 'active';
        const cn = g.cn !== g.name ? g.cn : g.name;
        const q = g.quality > 0 ? ` <span style="color:var(--green)">Q${g.quality}</span>` : '';
        html += `<div class="gem"><div class="gem-dot ${dotCls}"></div>
          <div class="gem-name${g.enabled?'':' disabled'}">${escHtml(cn)}</div>
          <div class="gem-lvl">L${g.level}${q}</div></div>`;
      });
      html += `</div>`;
    });
    html += `</div>`;
  }

  // ── Damage stats ──
  const dmgStats = (b.stats || []).filter(s => ['damage','offence'].includes(s.group));
  if (dmgStats.length) {
    html += `<div class="skill-dmg-section">
      <div class="skill-dmg-title">📈 伤害数据</div>
      <div class="skill-dmg-grid">`;
    dmgStats.forEach(s => {
      html += `<div class="skill-dmg-card">
        <div class="skill-dmg-name">${s.icon || ''} ${escHtml(s.name)}</div>
        <div class="skill-dmg-val">${escHtml(String(s.value))}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ── Survival stats for reference ──
  const survStats = (b.stats || []).filter(s => ['survival','defence','resist'].includes(s.group));
  if (survStats.length) {
    html += `<div class="skill-dmg-section">
      <div class="skill-dmg-title">🛡️ 防御数据</div>
      <div class="skill-dmg-grid">`;
    survStats.forEach(s => {
      html += `<div class="skill-dmg-card">
        <div class="skill-dmg-name">${s.icon || ''} ${escHtml(s.name)}</div>
        <div class="skill-dmg-val">${escHtml(String(s.value))}</div>
      </div>`;
    });
    html += `</div></div>`;
  }

  // ── Notes ──
  if (b.notes) {
    html += `<div class="skill-dmg-section">
      <div class="skill-dmg-title">📝 构筑备注</div>
      <div class="notes-text">${escHtml(b.notes)}</div>
    </div>`;
  }

  return html || '<div class="empty-panel">无技能伤害数据</div>';
}
function renderStats(stats) {
  if (!stats || stats.length === 0) return '<div class="empty">无属性数据</div>';

  const groups = {
    survival: { title: '生存', items: [] },
    defence: { title: '防御', items: [] },
    resist: { title: '抗性', items: [] },
    damage: { title: '伤害', items: [] },
    offence: { title: '攻击', items: [] },
  };

  stats.forEach(s => {
    (groups[s.group] || groups.offence).items.push(s);
  });

  // Stats that support source breakdown (non-DPS)
  const SOURCE_STATS = new Set(['Life','EnergyShield','Mana','Armour','Evasion','Ward',
    'FireResist','ColdResist','LightningResist','ChaosResist','CritChance','CritMultiplier','Speed','HitChance']);

  let html = '';
  for (const [key, grp] of Object.entries(groups)) {
    if (grp.items.length === 0) continue;
    html += `<div class="stat-section">
      <div class="stat-section-title">${grp.title}</div>
      <div class="stats-grid">`;
    grp.items.forEach(s => {
      const hasSrc = SOURCE_STATS.has(s.id);
      const clickAttr = hasSrc ? `onclick="showStatSources('${s.id}')" title="点击查看来源"` : '';
      html += `<div class="stat-item" ${clickAttr}>
        <div class="stat-icon">${s.icon}</div>
        <div class="stat-info">
          <div class="stat-name">${s.name}</div>
          <div class="stat-value">${s.value}</div>
        </div>
        ${hasSrc ? '<div class="stat-item-src-btn">🔍</div>' : ''}
      </div>`;
    });
    html += `</div></div>`;
  }
  return html;
}

// ══ Interactive Damage View (center panel) ══
function _showDmgView() {
  const el = document.getElementById('dmgView');
  const content = document.getElementById('dmgViewContent');
  el.style.display = 'block';
  const b = window._currentBuild;
  if (!b || !b.damage_breakdown || b.damage_breakdown.error || !b.damage_breakdown.skill_name) {
    content.innerHTML = '<div style="color:var(--text2);text-align:center;padding:40px">加载构筑后显示伤害分解</div>';
    return;
  }
  const db = b.damage_breakdown;
  const rawStats = b.stats || [];
  const smAux = {};
  for (const s of rawStats) if (s && s.id) smAux[s.id] = s.raw || 0;
  const pobHit = db.pob_avg_hit || db.computed_avg_hit || 0;
  const pobDPS = smAux['TotalDPS'] || 0;
  const pobSpd = smAux['Speed'] || 0;
  const pobCmb = smAux['CombinedDPS'] || 0;
  const fmtH = n => n >= 1e6 ? (n/1e6).toFixed(2)+'M' : n >= 10000 ? (n/1000).toFixed(1)+'K' : n >= 1000 ? n.toLocaleString() : n.toFixed(1);
  const dpsStr = pobDPS > 0 ? `<span style="color:#c8c0b0;font-size:12px">TotalDPS：</span><span style="color:#f0d078;font-size:22px;font-weight:bold">${fmtH(pobDPS)}</span><span style="color:#806050;font-size:11px">  ÷ ${pobSpd.toFixed(2)}/秒</span>` : '';
  const cmStr  = pobCmb > pobDPS * 1.05 ? `<span style="color:#806050;font-size:11px">  综合DPS ${fmtH(pobCmb)}</span>` : '';
  content.innerHTML = `
    <div style="background:#1a1208;border:1px solid #c8a24b88;border-radius:6px;padding:8px 16px;margin-bottom:10px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <span style="color:#806050;font-size:11px">${db.skill_cn||db.skill_name} L${db.gem_level||'?'}</span>
      ${dpsStr}${cmStr}
      <span style="color:#c8c0b0;font-size:12px">单次命中：</span>
      <span style="color:#c8a24b;font-size:18px;font-weight:bold">${fmtH(pobHit)}</span>
    </div>
    <div id="dvtWrap" style="position:relative;width:100%"><canvas id="dvtCanvas" style="display:block;cursor:default"></canvas><div id="dvtCard" class="dvt-card" style="display:none"></div></div>`;
  requestAnimationFrame(() => drawDmgTree(db, b.stats));
}

function goToNode(nodeId) {
  // Switch to tree tab
  const btn = document.getElementById('ctab-tree');
  switchCTab('tree', btn);
  if (!window._treeData || !window._treeData.nodes) return;
  const nd = window._treeData.nodes[nodeId];
  if (!nd) return;
  // Center on node
  const canvas = document.getElementById('treeCanvas');
  const W = canvas.width, H = canvas.height;
  const sc = window._treeView && window._treeView.scale ? window._treeView.scale : 0.28;
  window._treeView = window._treeView || {};
  window._treeView.x = W/2 - nd.x * sc;
  window._treeView.y = H/2 - nd.y * sc;
  window._treeView.scale = Math.max(sc, 1.2);
  window._treeView.x = W/2 - nd.x * window._treeView.scale;
  window._treeView.y = H/2 - nd.y * window._treeView.scale;
  // Highlight this node
  window._highlightNodeId = nodeId;
  if (window._drawTreeFn) window._drawTreeFn();
}

function goToSlot(slotEn) {
  // Switch to equip tab
  const btn = document.getElementById('ctab-equip');
  switchCTab('equip', btn);
  // After equip renders, scroll to the slot
  setTimeout(() => {
    const all = document.querySelectorAll('.eq-slot-card, .eq-slot');
    for (const el of all) {
      if (el.dataset.slot === slotEn || el.querySelector('[data-slot="' + slotEn + '"]')) {
        el.scrollIntoView({behavior:'smooth', block:'center'});
        el.style.outline = '2px solid var(--gold)';
        setTimeout(() => el.style.outline = '', 2000);
        break;
      }
    }
  }, 150);
}

function drawDmgTree(db, stats) {
  const canvas = document.getElementById('dvtCanvas');
  if (!canvas) return;
  const wrap = document.getElementById('dvtWrap');
  if (!wrap) return;
  const ctx = canvas.getContext('2d');
  const fmt  = n => { if (!n&&n!==0) return '0'; n=Number(n); return n>=1e6?(n/1e6).toFixed(2)+'M':n>=10000?(n/1000).toFixed(1)+'K':n>=1000?n.toLocaleString():n.toFixed(1); };
  const fmtP = p => (p>0?'+':'')+Number(p).toFixed(1)+'%';
  // Data
  const finalHit    = db.pob_avg_hit || db.computed_avg_hit || 0;
  const statMap = {};
  for (const s of (stats||[])) if (s&&s.id) statMap[s.id]=s.raw||0;
  const pobSpeed    = statMap['Speed']||0;
  const pobTotalDPS = statMap['TotalDPS']||0;
  const pobCombined = statMap['CombinedDPS']||pobTotalDPS;
  const incFactor   = db.inc_factor||1;
  const incTotal    = db.inc_total||0;
  const critScale   = db.crit_scale||1;
  const hasCrit     = critScale > 1.001;
  const moreChain   = db.more_chain||[];
  const denom       = incFactor * moreChain.reduce((p,m)=>p*Number(m.mult||1),1) * (hasCrit?critScale:1);
  const implied     = (finalHit>0&&denom>0) ? finalHit/denom : (db.base_avg||0);
  const nodeDetails = (db.inc_nodes_detail||[]).slice().sort((a,b)=>b.pct-a.pct);
  const itemDetails = (db.inc_items_detail||[]).slice().sort((a,b)=>b.pct-a.pct);
  const hasDPS      = pobSpeed>0 && pobTotalDPS>0;
  // Colors
  const C = {
    bg:  '#09070a',
    dps: { fill:'#1e1600', stroke:'#f0d078', text:'#f0d078' },
    hit: { fill:'#1a1208', stroke:'#c8a24b', text:'#c8a24b' },
    base:{ fill:'#0a1220', stroke:'#5588ee', text:'#88aaff' },
    inc: { fill:'#0c1a0c', stroke:'#50c878', text:'#78e878' },
    more:{ fill:'#1a0e04', stroke:'#cc8844', text:'#ddaa66' },
    crit:{ fill:'#120a1e', stroke:'#aa66cc', text:'#cc88ff' },
    nd:  { fill:'#0c150c', stroke:'#308830', text:'#a8d8a8', acc:'#50c878' },
    it:  { fill:'#160e04', stroke:'#705030', text:'#d8c0a0', acc:'#cc8844' },
    t2:  '#806050',
  };
  const SLOT_CN = {'Weapon1':'主武器','Weapon2':'副武器','Helmet':'头盔','BodyArmour':'胸甲','Gloves':'手套','Boots':'靴子','Amulet':'项链','Ring1':'戒指1','Ring2':'戒指2','Belt':'腰带'};
  // Layout
  wrap.style.overflow = 'auto';
  const cW   = Math.max(wrap.clientWidth || 800, 420);
  const PH   = 20;
  const BW   = cW - PH * 2;
  const BX   = PH;
  const CN_W = Math.min(320, BW * 0.65);
  const CN_H = 54;
  const CN_X = PH + (BW - CN_W) / 2;
  const LW   = 132, LH = 40;
  const OP_W = 22;
  const LPH  = 12, LPV = 10;
  const GH   = 22;
  const LGAP = 18;
  const PV   = 20;
  const laW  = BW - LPH * 2;
  const nC   = Math.max(1, Math.floor((laW + OP_W) / (LW + OP_W)));

  // Build leaf list
  const allLeaves = [];
  if (nodeDetails.length > 0) {
    allLeaves.push({ isSep:true, label:'🌳 天赋节点 ('+nodeDetails.length+')', color:C.nd.acc });
    for (const nd of nodeDetails) allLeaves.push({
      title:nd.source||'天赋', sub:nd.mod||'', val:fmtP(nd.pct), style:C.nd,
      tip:'🌳 '+(nd.source||'天赋节点')+'\n增伤: '+fmtP(nd.pct)+'\n'+(nd.mod||'')+'\n点击→天赋树定位',
      meta:{type:'node',data:nd}
    });
  }
  if (itemDetails.length > 0) {
    allLeaves.push({ isSep:true, label:'⚔️ 装备词条 ('+itemDetails.length+')', color:C.it.acc });
    for (const it of itemDetails) allLeaves.push({
      title:it.mod||it.item_name||it.source||'装备',
      sub:it.item_name?(SLOT_CN[it.slot_en]||it.slot_en||'')+'·'+it.item_name:(it.source||''),
      val:fmtP(it.pct), style:C.it,
      tip:'⚔️ '+(it.item_name||'装备')+'\n增伤: '+fmtP(it.pct)+'\n槽位: '+(it.slot_en||'')+'\n点击→装备面板',
      meta:{type:'item',data:it}
    });
  }

  // Layout leaves into rows with + operators
  function layoutLeaves(leaves) {
    const lx0 = BX + LPH;
    const items = [];
    let relY = LPV, col = 0;
    for (const lf of leaves) {
      if (lf.isSep) {
        if (col > 0) { relY += LH + 8; col = 0; }
        items.push({ isSep:true, lf, x:lx0, relY, w:laW, h:GH });
        relY += GH + 4;
        continue;
      }
      const cx = lx0 + col * (LW + OP_W);
      if (col > 0) items.push({ isOp:true, op:'+', x:cx-OP_W, relY, w:OP_W, h:LH });
      items.push({ lf, x:cx, relY, w:LW, h:LH });
      col++;
      if (col >= nC) { relY += LH + 8; col = 0; }
    }
    if (col > 0) relY += LH + 8;
    relY += LPV;
    return { items, totalH:relY };
  }

  // Chain defs
  const chainDefs = [];
  if (hasDPS) chainDefs.push({ id:'dps', style:C.dps,
    title:'⚔ 总 DPS', val:fmt(pobTotalDPS),
    sub:pobCombined>pobTotalDPS*1.05?'综合 '+fmt(pobCombined)+'  /  攻速 '+pobSpeed.toFixed(2)+'/s':'攻速 '+pobSpeed.toFixed(2)+'/s',
    tip:'总DPS: '+fmt(pobTotalDPS)+'\n综合DPS: '+fmt(pobCombined)+'\n攻速: '+pobSpeed.toFixed(2)+'/秒'
  });
  chainDefs.push({ id:'hit', style:hasDPS?C.hit:C.dps,
    title:'🎯 单次命中', val:fmt(finalHit), sub:'PoB AverageHit',
    tip:'AverageHit: '+fmt(finalHit)+'\n= 基础 × 增伤 × More × 暴击均摊'
  });
  // Base leaves: single box with min~max range (or per-type if base_detail available)
  const baseLfRaw = db.base_detail || [];
  const baseLfItems = baseLfRaw.length > 0
    ? baseLfRaw.map(bd => ({
        title: bd.type_cn||bd.type_en||'基础', sub: bd.slot||'',
        val: (bd.min||0)+'~'+(bd.max||0), style: C.base, tip: (bd.type_cn||bd.type_en||'基础')+'\n范围: '+(bd.min||0)+' ~ '+(bd.max||0), meta:null }))
    : [{ title: db.skill_cn||db.skill_name||'技能基础', sub: '效率×'+(db.damage_effectiveness||1),
        val: (db.base_min||0)+'~'+(db.base_max||0), style: C.base,
        tip: '基础伤害范围: '+(db.base_min||0)+' ~ '+(db.base_max||0)+'\n均值: '+fmt(implied), meta:null }];
  const baseLayout = layoutLeaves(baseLfItems);
  chainDefs.push({ id:'base', style:C.base, leafLayout:baseLayout,
    title:'💎 技能基础', val:fmt(implied),
    sub:(db.skill_cn||db.skill_name||'')+' L'+(db.gem_level||'?')+'  效率×'+(db.damage_effectiveness||1),
    tip:'基础平均伤害: '+fmt(implied)+'\n技能: '+(db.skill_cn||db.skill_name||'')+' L'+(db.gem_level||'?')+'\n伤害效率: ×'+(db.damage_effectiveness||1)
  });
  const incLayout = layoutLeaves(allLeaves);
  chainDefs.push({ id:'inc', style:C.inc, leafLayout:incLayout,
    title:'⊕ 增伤叠加', val:'×'+incFactor.toFixed(2),
    sub:'+'+incTotal.toFixed(0)+'%  ·  '+(nodeDetails.length+itemDetails.length)+' 条',
    tip:'增伤乘区: ×'+incFactor.toFixed(2)+'\n所有增伤叠加: +'+incTotal.toFixed(0)+'%'
  });
  for (let mi=0;mi<moreChain.length;mi++) {
    const m=moreChain[mi];
    chainDefs.push({ id:'more_'+mi, style:C.more, meta:{type:'gem_more',data:m},
      title:'✕ 更多伤害', val:'×'+Number(m.mult||1).toFixed(2),
      sub:m.name_cn||m.name_en||'辅助宝石',
      tip:'More乘区: ×'+Number(m.mult||1).toFixed(2)+'\n来源: '+(m.name_cn||m.name_en||'辅助宝石')+'\n'+(m.stat||'')
    });
  }
  if (hasCrit) chainDefs.push({ id:'crit', style:C.crit,
    title:'⚡ 暴击均摊', val:'×'+critScale.toFixed(3),
    sub:'暴击率 '+db.crit_chance+'%  ·  倍率 ×'+Number(db.crit_multi||1).toFixed(2),
    tip:'暴击均摊: ×'+critScale.toFixed(3)+'\n暴击率: '+db.crit_chance+'%\n暴击倍率: ×'+Number(db.crit_multi||1).toFixed(2)
  });

  // Compute Y positions
  const geoList = [];
  let curY = PV;
  for (const cd of chainDefs) {
    const ll = cd.leafLayout||null;
    const h  = CN_H + (ll ? ll.totalH : 0);
    geoList.push({ cd, y:curY, h, ll });
    curY += h + LGAP;
  }
  const totalH = curY - LGAP + PV;
  canvas.width = cW; canvas.height = totalH;

  // Draw background
  const hitAreas = [];
  ctx.fillStyle=C.bg; ctx.fillRect(0,0,cW,totalH);
  ctx.fillStyle='#ffffff03';
  for (let gx=0;gx<cW;gx+=60) for (let gy=0;gy<totalH;gy+=60) { ctx.beginPath();ctx.arc(gx,gy,1,0,Math.PI*2);ctx.fill(); }

  // Arrows between chain nodes
  for (let i=1;i<geoList.length;i++) {
    const p=geoList[i-1],c=geoList[i];
    const ax=CN_X+CN_W/2,y1=p.y+p.h,y2=c.y;
    const sty=c.cd.style;
    ctx.beginPath();ctx.moveTo(ax,y1);ctx.lineTo(ax,y2-6);
    ctx.strokeStyle=sty.stroke+'55';ctx.lineWidth=2;ctx.stroke();
    ctx.beginPath();ctx.moveTo(ax-5,y2-8);ctx.lineTo(ax,y2-1);ctx.lineTo(ax+5,y2-8);
    ctx.strokeStyle=sty.stroke+'99';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillStyle=sty.stroke+'cc';ctx.fillText('×',ax,(y1+y2)/2);
  }

  // Draw each chain node + its leaves
  for (const geo of geoList) {
    const {cd,y,h,ll}=geo, sty=cd.style;
    // Outer band for nodes with leaves
    if (ll&&ll.items.length>0) {
      ctx.beginPath();ctx.roundRect(BX,y,BW,h,10);
      ctx.fillStyle=sty.fill+'33';ctx.fill();
      ctx.strokeStyle=sty.stroke+'28';ctx.lineWidth=1;ctx.stroke();
    }
    // Chain node box
    ctx.shadowColor=sty.stroke+'60';ctx.shadowBlur=12;
    ctx.beginPath();ctx.roundRect(CN_X,y,CN_W,CN_H,8);
    ctx.fillStyle=sty.fill;ctx.fill();ctx.strokeStyle=sty.stroke;ctx.lineWidth=1.5;ctx.stroke();
    ctx.shadowBlur=0;
    ctx.fillStyle=sty.stroke;ctx.beginPath();ctx.roundRect(CN_X,y,3,CN_H,[8,0,0,8]);ctx.fill();
    ctx.font='bold 13px "Segoe UI"';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillStyle=sty.text||'#c8c0b0';ctx.fillText(cd.title,CN_X+12,y+CN_H*0.35);
    if(cd.sub){ctx.font='10px "Segoe UI"';ctx.fillStyle=C.t2;ctx.fillText(cd.sub,CN_X+12,y+CN_H*0.72);}
    if(cd.val){ctx.font='bold 17px monospace';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillStyle=sty.text||'#f0d078';ctx.fillText(cd.val,CN_X+CN_W-12,y+CN_H*0.5);}
    hitAreas.push({x:CN_X,y,w:CN_W,h:CN_H,isLeaf:false,cd});
    // Leaves
    if (ll) {
      const ly0=y+CN_H;
      for (const lr of ll.items) {
        const ly=ly0+lr.relY;
        if (lr.isSep) {
          ctx.font='bold 10px "Segoe UI"';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle=lr.lf.color||'#c8c0b0';
          ctx.fillText(lr.lf.label,lr.x,ly+lr.h/2);
          const tw=ctx.measureText(lr.lf.label).width;
          ctx.beginPath();ctx.moveTo(lr.x,ly+lr.h-1);ctx.lineTo(lr.x+tw+20,ly+lr.h-1);
          ctx.strokeStyle=(lr.lf.color||'#888')+'44';ctx.lineWidth=1;ctx.stroke();
        } else if (lr.isOp) {
          ctx.font='bold 13px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
          ctx.fillStyle='#50c87888';ctx.fillText(lr.op,lr.x+lr.w/2,ly+lr.h/2);
        } else {
          const lf=lr.lf,ls=lf.style||C.nd;
          ctx.beginPath();ctx.roundRect(lr.x,ly,lr.w,lr.h,4);
          ctx.fillStyle=ls.fill;ctx.fill();ctx.strokeStyle=ls.stroke;ctx.lineWidth=1;ctx.stroke();
          ctx.fillStyle=ls.acc||ls.stroke;ctx.fillRect(lr.x,ly+2,2,lr.h-4);
          const vW=46;
          if(lf.sub){
            ctx.font='bold 9px "Segoe UI"';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle=ls.text||'#c8c0b0';
            let t=lf.title;while(t.length>1&&ctx.measureText(t).width>lr.w-vW-10)t=t.slice(0,-1);if(t!==lf.title)t+='…';
            ctx.fillText(t,lr.x+6,ly+lr.h*0.32);
            ctx.font='8px "Segoe UI"';ctx.fillStyle=C.t2;
            let s=lf.sub;while(s.length>1&&ctx.measureText(s).width>lr.w-10)s=s.slice(0,-1);if(s!==lf.sub)s+='…';
            ctx.fillText(s,lr.x+6,ly+lr.h*0.72);
          } else {
            ctx.font='9px "Segoe UI"';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillStyle=ls.text||'#c8c0b0';
            let t=lf.title;while(t.length>1&&ctx.measureText(t).width>lr.w-vW-10)t=t.slice(0,-1);if(t!==lf.title)t+='…';
            ctx.fillText(t,lr.x+6,ly+lr.h/2);
          }
          ctx.font='bold 9px monospace';ctx.textAlign='right';ctx.textBaseline='middle';ctx.fillStyle=ls.acc||'#c8c0b0';
          ctx.fillText(lf.val||'',lr.x+lr.w-5,lf.sub?ly+lr.h*0.32:ly+lr.h/2);
          hitAreas.push({x:lr.x,y:ly,w:lr.w,h:lr.h,isLeaf:true,lf});
        }
      }
    }
  }

  // Events
  function getHit(ev) {
    const r=canvas.getBoundingClientRect();
    const sx=canvas.width/r.width,sy=canvas.height/r.height;
    const mx=(ev.clientX-r.left)*sx,my=(ev.clientY-r.top)*sy;
    for (let i=hitAreas.length-1;i>=0;i--) { const ha=hitAreas[i]; if(mx>=ha.x&&mx<=ha.x+ha.w&&my>=ha.y&&my<=ha.y+ha.h)return ha; }
    return null;
  }
  canvas.onmousemove=ev=>{
    const hit=getHit(ev);
    if(hit){
      const tip=hit.isLeaf?hit.lf.tip:hit.cd.tip;
      canvas.style.cursor=(hit.isLeaf&&hit.lf.meta)||(!hit.isLeaf&&hit.cd&&hit.cd.meta)?'pointer':'default';
      if(tip)_showNodeTip(ev,{tip});
    } else {canvas.style.cursor='default';hideDvtCard();}
  };
  canvas.onmouseleave=()=>{canvas.style.cursor='default';hideDvtCard();};
  canvas.onclick=ev=>{
    const hit=getHit(ev);if(!hit)return;
    if(hit.isLeaf&&hit.lf.meta){
      const m=hit.lf.meta;
      if(m.type==='node'&&m.data.node_id)goToNode(m.data.node_id);
      else if(m.type==='item'&&m.data.slot_en)goToSlot(m.data.slot_en);
    } else if(!hit.isLeaf&&hit.cd&&hit.cd.meta){
      if(hit.cd.meta.type==='gem_more')switchCTab('skills',document.getElementById('ctab-skills'));
    }
  };
}

function _showNodeTip(ev,node){
  const card=document.getElementById('dvtCard');
  if(!card||!node.tip)return;
  card.innerHTML=node.tip.split('\n').map(l=>`<div style="line-height:1.6">${l}</div>`).join('');
  card.style.display='block';
  positionDvtCard(ev,card);
}

function positionDvtCard(ev, card) {
  card.style.left = (ev.clientX + 18) + 'px';
  card.style.top = (ev.clientY - 10) + 'px';
  requestAnimationFrame(() => {
    const cr = card.getBoundingClientRect();
    if (cr.right > window.innerWidth - 10) card.style.left = (ev.clientX - cr.width - 18) + 'px';
    if (cr.bottom > window.innerHeight - 10) card.style.top = (ev.clientY - cr.height + 10) + 'px';
  });
}

function hideDvtCard() {
  const card = document.getElementById('dvtCard');
  if (card) card.style.display = 'none';
}

// (renderDamageBreakdown removed — replaced by drawDmgTree canvas)

function renderSkills(skills) {
  if (!skills || skills.length === 0) return '<div class="empty">无技能数据</div>';
  let html = '';
  skills.forEach(sg => {
    if (!sg.enabled) return;
    const slotLabel = sg.slot || '未知插槽';
    const groupLabel = sg.label ? `<span class="label">「${sg.label}」</span>` : '';
    html += `<div class="skill-group">
      <div class="skill-slot">🔷 ${slotLabel} ${groupLabel}</div>`;
    sg.gems.forEach(g => {
      const dotCls = !g.enabled ? 'disabled' : g.is_support ? 'support' : 'active';
      const nameCls = g.enabled ? '' : 'disabled';
      const cn = g.cn !== g.name ? g.cn : g.name;
      const qualityHtml = g.quality > 0 ? ` <span class="quality">Q${g.quality}</span>` : '';
      html += `<div class="gem">
        <div class="gem-dot ${dotCls}"></div>
        <div class="gem-name ${nameCls}">${cn}</div>
        <div class="gem-lvl">L${g.level}${qualityHtml}</div>
      </div>`;
    });
    html += `</div>`;
  });
  return html || '<div class="empty">无启用技能</div>';
}

function renderItems(items) {
  if (!items || items.length === 0) return '<div class="empty">无装备数据</div>';
  // Just show a compact list in the right panel for reference
  let html = '';
  items.forEach(item => {
    const rc = RARITY_CLASS[item.rarity] || 'rarity-Normal';
    html += `<div class="item-card ${rc}" style="cursor:pointer" onclick="switchRTab('items',null)">
      <div class="item-slot-label">${item.slot}</div>

let _treeData = null, _treeView = {x:0, y:0, scale:1}, _treeDragging = false;
let _treeDragStart = {x:0, y:0}, _treeViewStart = {x:0, y:0};
let _hoveredNodeId = null;

function showNodeTooltip(clientX, clientY, node, allocSet) {
  let tip = document.getElementById('nodeTooltip');
  if (!tip) return;

  let typeLabel = '';
  if (node.isKeystone) typeLabel = '⬡ 天赋石';
  else if (node.isNotable) typeLabel = '◆ 显赫天赋';
  else if (node.isMastery) typeLabel = '✦ 精通';
  else if (node.ascendancy) typeLabel = '◉ 升华';
  else typeLabel = '● 天赋';

  const allocated = allocSet && allocSet.has(node.id);
  const mods = (node.stats || []).slice(0, 8);
  let html = '<div class="tip-name">' + (node.name || '未命名节点') + '</div>';
  html += '<div class="tip-type">' + typeLabel + (allocated ? ' <span style="color:var(--green)">✓ 已分配</span>' : '') + '</div>';
  if (mods.length) {
    html += '<div class="tip-mods">';

    html += '</div>';
  }
  tip.innerHTML = html;
  tip.style.display = 'block';

  // Position: prefer right of cursor, flip if near right edge
  const vw = window.innerWidth, vh = window.innerHeight;

  tip.style.left = '0'; tip.style.top = '0'; // reset to measure
  const tw = Math.min(260, tip.scrollWidth || 220);
  const th = tip.scrollHeight || 120;
  if (tx + tw > vw - 10) tx = clientX - tw - 10;
  if (ty + th > vh - 10) ty = vh - th - 10;
  if (ty < 10) ty = 10;
  tip.style.left = tx + 'px';
  tip.style.top = ty + 'px';
}

async function loadTreeCanvas() {
  const b = window._currentBuild;
  if (!b || !b.tree || !b.tree.specs || b.tree.specs.length === 0) return;

  const spec = b.tree.specs[0];
  const version = spec.tree_version;
  const nodeIds = spec.node_ids || [];

  document.getElementById('treeInfo').textContent = '正在加载 v' + version + ' 完整天赋树...';

  try {
    const nodeParam = nodeIds.join(',');
    const r = await fetch(API + '/api/tree-all?version=' + version + '&nodes=' + nodeParam);
    const d = await r.json();
    if (!d.success) {
      document.getElementById('treeInfo').textContent = '加载失败: ' + (d.error || '未知错误');
      return;
    }
    _treeData = d;
    document.getElementById('treeInfo').textContent =
      '共 ' + d.total + ' 节点，已分配 ' + d.allocated_count + ' · 滚轮缩放 · 拖拽平移';
    window._treeLoaded = true;
    // Only show overlay if tree tab is currently active
    const activeCtab = document.querySelector('.ctab.active');
    if (!activeCtab || activeCtab.id === 'ctab-tree') {
      document.getElementById('treeControlsOverlay').style.display = 'flex';
    }
    initTreeCanvas(nodeIds);
  } catch(e) {
    document.getElementById('treeInfo').textContent = '网络错误: ' + e.message;
  }
}
function initTreeCanvas(allocatedIds) {
  const container = document.getElementById('treeContainer');
  if (!container || !_treeData) return;

  const menuH = 36; // center top menu height
  const W = container.clientWidth;
  const H = container.clientHeight - menuH;
  const canvas = document.getElementById('treeCanvas');
  canvas.width = W;
  canvas.height = H;
  canvas.style.top = menuH + 'px';

  const allocSet = new Set(allocatedIds);
  const nodes = _treeData.nodes;
  const bounds = _treeData.bounds || {};

  const treeW = (bounds.max_x || 12430) - (bounds.min_x || -13902);
  const treeH = (bounds.max_y || 10023) - (bounds.min_y || -10689);
  const fitScale = Math.min(W / treeW, H / treeH) * 0.9;
  const centerX = ((bounds.min_x || -13902) + (bounds.max_x || 12430)) / 2;
  const centerY = ((bounds.min_y || -10689) + (bounds.max_y || 10023)) / 2;

  _treeView = {
    x: W / 2 - centerX * fitScale,
    y: H / 2 - centerY * fitScale,
    scale: fitScale
  };

  window._drawTreeFn = () => drawTree(canvas, nodes, allocSet);
  drawTree(canvas, nodes, allocSet);

  // Zoom
  canvas.onwheel = (e) => {
    e.preventDefault();
    const factor = e.deltaY < 0 ? 1.15 : 0.87;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    _treeView.x = mx + (_treeView.x - mx) * factor;
    _treeView.y = my + (_treeView.y - my) * factor;
    _treeView.scale *= factor;
    drawTree(canvas, nodes, allocSet);
  };

  // Pan
  canvas.onmousedown = (e) => {
    _treeDragging = true;
    _treeDragStart = { x: e.clientX, y: e.clientY };
    _treeViewStart = { ..._treeView };
  };
  window.onmousemove = (e) => {
    if (!_treeDragging) return;
    _treeView.x = _treeViewStart.x + (e.clientX - _treeDragStart.x);
    _treeView.y = _treeViewStart.y + (e.clientY - _treeDragStart.y);
    drawTree(canvas, nodes, allocSet);
  };
  window.onmouseup = () => { _treeDragging = false; };

  // Node hover: show info in right panel
  canvas.onmousemove = (e) => {
    if (_treeDragging) return;
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    const s = _treeView.scale, ox = _treeView.x, oy = _treeView.y;

    let closest = null, closestDist = Infinity;
    for (const node of Object.values(nodes)) {
      const nx = node.x * s + ox;
      const ny = node.y * s + oy;
      if (nx < -40 || nx > canvas.width + 40 || ny < -40 || ny > canvas.height + 40) continue;
      const dist = Math.hypot(mx - nx, my - ny);
      if (dist < closestDist) { closestDist = dist; closest = node; }
    }

    const threshold = Math.max(16, s * 22);
    if (closest && closestDist < threshold) {
      if (_hoveredNodeId !== closest.id) {
        _hoveredNodeId = closest.id;
        drawTree(canvas, nodes, allocSet);
      }
      showNodeTooltip(e.clientX, e.clientY, closest, allocSet);
      // Update right panel hover info
      const hoverEl = document.getElementById('nodeHoverInfo');
      document.getElementById('nhName').textContent = closest.name || ('节点 #' + closest.id);
      let typeStr = '';
      if (closest.isKeystone) typeStr = '⬡ 天赋石';
      else if (closest.isNotable) typeStr = '◆ 显赫天赋';
      else if (closest.isMastery) typeStr = '✦ 精通';
      else if (closest.ascendancy) typeStr = '◉ 升华天赋';
      else typeStr = '● 普通天赋';
      if (allocSet.has(closest.id)) typeStr += ' ✓ 已分配';
      document.getElementById('nhType').textContent = typeStr;
      const mods = (closest.stats || []).slice(0, 8);
      document.getElementById('nhMods').innerHTML = mods.length
        ? mods.map(s => '<div style="line-height:1.5;border-bottom:1px solid rgba(61,48,32,0.4);padding:2px 0">' + s + '</div>').join('')
        : '<span style="color:var(--text2);font-size:11px">无词条</span>';
      hoverEl.style.display = 'block';
    } else {
      if (_hoveredNodeId !== null) {
        _hoveredNodeId = null;
        drawTree(canvas, nodes, allocSet);
      }
      hideNodeTooltip();
      document.getElementById('nodeHoverInfo').style.display = 'none';
    }
  };
  canvas.onmouseleave = () => {
    _hoveredNodeId = null;
    hideNodeTooltip();
    document.getElementById('nodeHoverInfo').style.display = 'none';
    drawTree(canvas, nodes, allocSet);
  };

  // Touch support
  let lastTouchDist = null;
  canvas.ontouchstart = (e) => {
    if (e.touches.length === 1) {
      _treeDragging = true;
      _treeDragStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
      _treeViewStart = { ..._treeView };
    } else if (e.touches.length === 2) {
      lastTouchDist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
    }
  };
  canvas.ontouchmove = (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && _treeDragging) {
      _treeView.x = _treeViewStart.x + (e.touches[0].clientX - _treeDragStart.x);
      _treeView.y = _treeViewStart.y + (e.touches[0].clientY - _treeDragStart.y);
      drawTree(canvas, nodes, allocSet);
    } else if (e.touches.length === 2 && lastTouchDist) {
      const dist = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const factor = dist / lastTouchDist;
      const mx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const my = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = canvas.getBoundingClientRect();
      const cmx = mx - rect.left, cmy = my - rect.top;
      _treeView.x = cmx + (_treeView.x - cmx) * factor;
      _treeView.y = cmy + (_treeView.y - cmy) * factor;
      _treeView.scale *= factor;
      lastTouchDist = dist;
      drawTree(canvas, nodes, allocSet);
    }
  };
  canvas.ontouchend = () => { _treeDragging = false; lastTouchDist = null; };
}
function drawTree(canvas, nodes, allocSet) {
  const ctx = canvas.getContext('2d');
  const { x: ox, y: oy, scale: s } = _treeView;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Dark background
  ctx.fillStyle = '#080604';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const nodeArr = Object.values(nodes);
  const showConnections = s > 0.006;

  // === Draw connections ===
  if (showConnections) {
    nodeArr.forEach(node => {
      // Skip ROOT node - its connections to class starters cause visual artifacts
      if (!node.name || node.id === 'root' || node.group == null) return;
      const sx = node.x * s + ox;
      const sy = node.y * s + oy;
      const margin = 80;
      if (sx < -margin || sx > canvas.width + margin || sy < -margin || sy > canvas.height + margin) return;

      (node.out || []).forEach(toId => {
        const to = nodes[toId];
        if (!to) return;
        const tx = to.x * s + ox;
        const ty = to.y * s + oy;

        const fromAlloc = allocSet.has(node.id);
        const toAlloc = allocSet.has(toId);
        const bothAlloc = fromAlloc && toAlloc;

        // Only draw connections where both endpoints are allocated
        // (prevents lines from visually crossing through unallocated nodes)
        if (!bothAlloc) return;

        // Skip connections to/from ascendancy nodes — they're in a separate coordinate space
        // and create long crossing lines through the main tree
        if (node.ascendancy || to.ascendancy) return;

        // Skip connections to/from mastery nodes — they sit at group centers
        // and connecting to them creates misleading visual lines
        if (node.isMastery || to.isMastery) return;

        ctx.strokeStyle = 'rgba(210,170,80,0.9)';
        ctx.lineWidth = Math.max(1.2, s * 3.5);

        // Arc if same group and same orbit
        const sameOrbit = node.group != null && node.group === to.group && node.orbit != null && node.orbit === to.orbit && node.orbit > 0;

        if (sameOrbit && node.gx != null && node.gy != null) {
          // Recompute canvas angles from positions (canvas y-axis flipped vs PoB y)
          // PoB: x = gx + r*sin(a), y = gy - r*cos(a)  →  canvas arc angle = atan2(nx-gcx, gcy-ny)
          const gcx = node.gx * s + ox;
          const gcy = node.gy * s + oy;
          const orbitR = Math.sqrt((node.x - node.gx) ** 2 + (node.y - node.gy) ** 2);
          const arcR = orbitR * s;

          if (arcR > 1) {
            // Canvas angle: atan2 from center to each node
            // In canvas: atan2(dy, dx) where dy = ny - gcy (down = positive)
            // PoB y is inverted vs canvas... actually both use screen coords (y down)
            // node.x = gx + r*sin(a), node.y = gy - r*cos(a)
            // In screen: nx = gcx + arcR*sin(a), ny = gcy - arcR*cos(a)
            // Canvas arc angle θ: nx = gcx + arcR*cos(θ), ny = gcy + arcR*sin(θ)
            // So: cos(θ) = sin(a), sin(θ) = -cos(a)  →  θ = a - π/2
            const ca1 = node.angle - Math.PI / 2;
            const ca2 = to.angle - Math.PI / 2;
            let diff = ca2 - ca1;
            while (diff > Math.PI) diff -= 2 * Math.PI;
            while (diff < -Math.PI) diff += 2 * Math.PI;
            const ccw = diff < 0;
            ctx.beginPath();
            ctx.arc(gcx, gcy, arcR, ca1, ca2, ccw);
            ctx.stroke();
          }
        } else {
          // Straight line
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(tx, ty);
          ctx.stroke();
        }
      });
    });
  }

  // === Draw nodes ===
  nodeArr.forEach(node => {
    // Skip ROOT node (virtual connector with no visual representation)
    if (!node.name || node.id === 'root' || node.group == null) return;
    // Skip ascendancy nodes — they're in a separate coordinate space far from main tree
    if (node.ascendancy) return;
    // Skip mastery nodes — they sit at group centers and are not standard passive nodes
    if (node.isMastery) return;
    const nx = node.x * s + ox;
    const ny = node.y * s + oy;

    // Skip off-screen
    if (nx < -30 || nx > canvas.width + 30 || ny < -30 || ny > canvas.height + 30) return;

    const alloc = allocSet.has(node.id);
    const isAsc = !!node.ascendancy;

    let radius, color, borderColor;
    if (node.isKeystone) {
      radius = Math.max(5, s * 18);
      color = alloc ? '#e8c56a' : '#2a1e0a';
      borderColor = alloc ? '#ffd700' : '#5a3e10';
    } else if (node.isNotable) {
      radius = Math.max(4, s * 13);
      color = alloc ? '#c8a24b' : '#1e1608';
      borderColor = alloc ? '#e8c56a' : '#4a3418';
    } else if (isAsc) {
      radius = Math.max(4, s * 14);
      color = alloc ? '#4080ff' : '#0d1428';
      borderColor = alloc ? '#80a8ff' : '#203060';
    } else if (node.isMastery) {
      radius = Math.max(3.5, s * 11);
      color = alloc ? '#a060d0' : '#1a0e28';
      borderColor = alloc ? '#c080ff' : '#3a1e5a';
    } else {
      radius = Math.max(2.5, s * 8);
      color = alloc ? '#a0c8d0' : '#141c1e';
      borderColor = alloc ? '#c0e0e8' : '#1e2c30';
    }

    ctx.beginPath();
    ctx.arc(nx, ny, radius, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    if (s > 0.015) {
      ctx.strokeStyle = borderColor;
      ctx.lineWidth = Math.max(0.5, s * 1.5);
      ctx.stroke();
    }

    // Hover highlight ring
    if (node.id === _hoveredNodeId) {
      ctx.beginPath();
      ctx.arc(nx, ny, radius + Math.max(3, s * 6), 0, Math.PI * 2);
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = Math.max(1.5, s * 2.5);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(nx, ny, radius + Math.max(1, s * 2), 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,220,100,0.6)';
      ctx.lineWidth = Math.max(1, s * 4);
      ctx.stroke();
    }
    // Navigate-to highlight ring (from goToNode)
    if (window._highlightNodeId && String(node.id) === String(window._highlightNodeId)) {
      ctx.beginPath();
      ctx.arc(nx, ny, radius + Math.max(5, s * 10), 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,80,80,0.9)';
      ctx.lineWidth = Math.max(2, s * 3);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(nx, ny, radius + Math.max(2, s * 4), 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255,120,120,0.4)';
      ctx.lineWidth = Math.max(4, s * 8);
      ctx.stroke();
    }

    // Labels for allocated nodes — show names when zoomed in enough
    if (s > 0.02 && node.name && alloc) {
      const isImportant = node.isKeystone || node.isNotable;
      if (isImportant || s > 0.05) {
        ctx.fillStyle = node.isKeystone ? '#ffd700' : node.isNotable ? '#e8c56a' : '#a0d0c0';
        const fontSize = Math.max(8, isImportant ? s * 14 : s * 11);
        ctx.font = `${fontSize}px '微软雅黑', sans-serif`;
        ctx.textAlign = 'center';
        ctx.shadowColor = '#000';
        ctx.shadowBlur = 3;
        ctx.fillText(node.name.substring(0, 20), nx, ny + radius + Math.max(9, s * 14));
        ctx.shadowBlur = 0;
      }
    }
  });
}
